<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Yedric Bombs</title>
<style>
  :root { --primary: #5eead4; --secondary: #2563eb; --bg: #fbcfe8; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--secondary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; }
  h1 { margin: 0; font-size: clamp(14px, 4vw, 22px); letter-spacing: 2px; color: var(--secondary); }
  #hud { display: flex; gap: 18px; font-size: clamp(11px, 3vw, 14px); opacity: 0.85; color: var(--secondary); }
  canvas { border: 3px solid var(--primary); box-shadow: 0 0 18px var(--primary);
    width: min(360px, 88vw); height: auto; display: block; background: #e8eef4; }
  #controls { display: flex; gap: 10px; width: min(360px, 88vw); }
  .btn { flex: 1; height: 56px; font-size: 26px; border: 2px solid var(--primary);
    background: rgba(255,255,255,0.5); color: var(--secondary); cursor: pointer; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; user-select: none; -webkit-touch-callout: none; }
  .btn:active, .btn.held { background: var(--primary); color: #fff; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: var(--primary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  #overlay p { color: #fff; margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: #0b3a44; border: none; cursor: pointer; border-radius: 6px; letter-spacing: 1px; font-weight: 600; }
</style>
</head>
<body>
<div id="wrap">
  <h1>YEDRIC BOMBS</h1>
  <div id="hud">
    <span>Yeti: Yedric</span>
    <span id="score">Dist: 0</span>
    <span id="hi">Best: 0</span>
  </div>
  <canvas id="game" width="360" height="540"></canvas>
  <div id="controls">
    <button class="btn" id="btn-left">←</button>
    <button class="btn" id="btn-right">→</button>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">Wipeout!</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Ski again</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl  = document.getElementById('score');
  const hiEl     = document.getElementById('hi');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const css = getComputedStyle(document.documentElement);
  const COL1 = css.getPropertyValue('--primary').trim();
  const COL2 = css.getPropertyValue('--secondary').trim();
  const W = canvas.width, H = canvas.height;

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME  = 'Yedric';
  const WIN_DIST     = 3500;
  const BASE_SPEED   = 3.5;
  const SPEED_INC    = 0.0004;
  const STEER        = 3.6;
  const GATE_BONUS   = 50;
  const JUMP_BONUS   = 25;
  const TREE_SPAWN   = 95;
  const ROCK_SPAWN   = 180;
  const ROBOT_SPAWN  = 230;
  const JUMP_SPAWN   = 310;
  const GATE_SPAWN   = 260;
  const JUMP_AIR_FRAMES = 42;

  const CRASH_MSGS = {
    tree:  PLAYER_NAME + ' face-planted into a pine. The forest is undefeated.',
    rock:  PLAYER_NAME + ' tagged a boulder at full send. Yeti bones, meet rock.',
    robot: 'A robot impostor caught ' + PLAYER_NAME + '. Identity theft, but worse.'
  };
  const WIN_MSG = PLAYER_NAME + ' crossed the finish line. Robot impostors weep in tin.';
  // ==================================

  const SKI_W = 14, SKI_H = 26;
  const PLAYER_Y = H * 0.72;

  const held = { left: false, right: false };
  const keys = {};

  function holdBtn(id, key) {
    const el = document.getElementById(id);
    const dn = e => { e.preventDefault(); held[key] = true; el.classList.add('held'); };
    const up = e => { e.preventDefault(); held[key] = false; el.classList.remove('held'); };
    el.addEventListener('mousedown', dn); el.addEventListener('mouseup', up); el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', dn, { passive: false });
    el.addEventListener('touchend', up, { passive: false }); el.addEventListener('touchcancel', up, { passive: false });
  }
  holdBtn('btn-left', 'left'); holdBtn('btn-right', 'right');
  addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'Enter' && overlay.style.display !== 'none') document.getElementById('restart').click();
  });
  addEventListener('keyup', e => { keys[e.key] = false; });

  // Swipe support on canvas
  let ts = null;
  canvas.addEventListener('touchstart', e => { ts = e.touches[0].clientX; started = true; }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    if (ts === null) return;
    const dx = e.touches[0].clientX - ts;
    if (dx < -10) { held.left = true; held.right = false; }
    else if (dx > 10) { held.right = true; held.left = false; }
  }, { passive: true });
  canvas.addEventListener('touchend', () => { held.left = false; held.right = false; ts = null; });

  // Proportional tilt steering via DeviceOrientation gamma (-90..90 deg, left..right)
  let tiltX = 0;
  function enableTilt() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(s => { if (s === 'granted') setupTilt(); }).catch(() => {});
    } else { setupTilt(); }
  }
  function setupTilt() {
    window.addEventListener('deviceorientation', e => {
      const g = e.gamma || 0;
      const DEAD = 8, MAX = 40;
      const abs = Math.abs(g);
      if (abs < DEAD) { tiltX = 0; return; }
      tiltX = Math.sign(g) * Math.min((abs - DEAD) / (MAX - DEAD), 1);
    });
  }
  document.addEventListener('touchstart', enableTilt, { once: true });

  let px, obstacles, score, hiScore = 0, spd, frame, running, started, airborne, crashKind, finishSpawned;

  function reset() {
    px = W / 2; obstacles = []; score = 0; spd = BASE_SPEED; frame = 0;
    running = true; started = false; airborne = 0; crashKind = 'tree'; finishSpawned = false;
    overlay.style.display = 'none'; updateHud();
  }
  function updateHud() { scoreEl.textContent = 'Dist: ' + score; hiEl.textContent = 'Best: ' + hiScore; }
  function postHi(s) { window.parent.postMessage({ highScore: s }, '*'); }
  function endGame(won) {
    running = false;
    let isNewBest = false;
    if (score > hiScore) { hiScore = score; postHi(hiScore); isNewBest = true; }
    overTitle.textContent = won ? 'You win!' : 'Wipeout!';
    overMsg.textContent = won ? WIN_MSG : (CRASH_MSGS[crashKind] || CRASH_MSGS.tree);
    overScore.textContent = 'Distance: ' + score + (isNewBest ? ' ★ new best!' : '  ·  Best: ' + hiScore);
    updateHud(); overlay.style.display = 'flex';
  }

  function spawnTree() {
    const x = 20 + Math.random() * (W - 40);
    obstacles.push({ type: 'tree', x, y: -20, r: 10 + Math.random() * 8 });
  }
  function spawnRock() {
    const x = 25 + Math.random() * (W - 50);
    obstacles.push({ type: 'rock', x, y: -20, r: 11 + Math.random() * 5 });
  }
  function spawnRobot() {
    const x = 35 + Math.random() * (W - 70);
    obstacles.push({ type: 'robot', x, y: -30, r: 13, wobble: Math.random() * Math.PI * 2 });
  }
  function spawnJump() {
    const x = 30 + Math.random() * (W - 60);
    obstacles.push({ type: 'jump', x, y: -20 });
  }
  function spawnGate() {
    const cx = 60 + Math.random() * (W - 120);
    const gap = 75 + Math.random() * 25;
    obstacles.push({ type: 'gate', cx, y: -10, gap, passed: false });
  }
  function spawnFinish() {
    obstacles.push({ type: 'finish', y: -30 });
  }

  function step() {
    frame++; spd += SPEED_INC;
    if (!started) return;

    if (keys['ArrowLeft'] || keys['a'] || held.left)  px -= STEER;
    if (keys['ArrowRight'] || keys['d'] || held.right) px += STEER;
    if (tiltX !== 0 && !held.left && !held.right) px += tiltX * STEER;
    px = Math.max(SKI_W, Math.min(W - SKI_W, px));

    if (airborne > 0) airborne--;

    if (!finishSpawned) {
      if (frame % TREE_SPAWN === 0) spawnTree();
      if (frame % ROCK_SPAWN === 0 && frame > 120) spawnRock();
      if (frame % ROBOT_SPAWN === 0 && frame > 280) spawnRobot();
      if (frame % JUMP_SPAWN === 0 && frame > 180) spawnJump();
      if (frame % GATE_SPAWN === 0) spawnGate();
    }

    for (const o of obstacles) {
      if (o.type === 'robot') {
        o.wobble += 0.07;
        o.x += Math.sin(o.wobble) * 0.6;
      }
    }

    for (const o of obstacles) o.y += spd;
    obstacles = obstacles.filter(o => o.y < H + 40);

    if (WIN_DIST > 0 && !finishSpawned && score >= WIN_DIST - 60) {
      spawnFinish();
      finishSpawned = true;
    }

    for (const o of obstacles) {
      if (o.type === 'tree' || o.type === 'rock' || o.type === 'robot') {
        const dx = px - o.x, dy = PLAYER_Y - o.y;
        if (Math.hypot(dx, dy) < o.r + 8) {
          if (airborne > 0 && (o.type === 'tree' || o.type === 'rock')) continue;
          crashKind = o.type;
          endGame(false); return;
        }
      } else if (o.type === 'jump') {
        const dx = px - o.x, dy = PLAYER_Y - o.y;
        if (Math.abs(dx) < 24 && Math.abs(dy) < 14 && airborne === 0) {
          airborne = JUMP_AIR_FRAMES;
          score += JUMP_BONUS;
        }
      } else if (o.type === 'gate' && !o.passed) {
        if (o.y > PLAYER_Y - 10 && o.y < PLAYER_Y + 20) {
          const inGap = px > o.cx - o.gap/2 && px < o.cx + o.gap/2;
          o.passed = true;
          if (inGap) score += GATE_BONUS;
        }
      } else if (o.type === 'finish') {
        if (o.y >= PLAYER_Y) { endGame(true); return; }
      }
    }

    score += Math.max(1, Math.floor(spd * 0.4));
    updateHud();
  }

  function drawTree(o) {
    ctx.fillStyle = '#1f7a2a';
    ctx.beginPath();
    ctx.moveTo(o.x, o.y - o.r * 1.9);
    ctx.lineTo(o.x - o.r, o.y + o.r * 0.3);
    ctx.lineTo(o.x + o.r, o.y + o.r * 0.3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#13561d';
    ctx.beginPath();
    ctx.moveTo(o.x, o.y - o.r * 1.0);
    ctx.lineTo(o.x - o.r * 0.85, o.y + o.r * 0.05);
    ctx.lineTo(o.x + o.r * 0.85, o.y + o.r * 0.05);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#6b3a18';
    ctx.fillRect(o.x - 3, o.y + o.r * 0.3, 6, o.r * 0.7);
  }

  function drawRock(o) {
    ctx.fillStyle = '#6b6b6b';
    ctx.beginPath();
    ctx.ellipse(o.x, o.y, o.r, o.r * 0.85, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#9a9a9a';
    ctx.beginPath();
    ctx.ellipse(o.x - o.r*0.35, o.y - o.r*0.3, o.r*0.35, o.r*0.22, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#4b4b4b';
    ctx.beginPath();
    ctx.ellipse(o.x + o.r*0.3, o.y + o.r*0.25, o.r*0.2, o.r*0.12, 0, 0, Math.PI*2);
    ctx.fill();
  }

  function drawRobot(o) {
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(o.x - 9, o.y - 10, 18, 22);
    ctx.fillStyle = '#6b7280';
    ctx.fillRect(o.x - 6, o.y - 5, 12, 10);
    ctx.fillStyle = '#a3aab5';
    ctx.fillRect(o.x - 8, o.y - 22, 16, 12);
    ctx.fillStyle = '#dd2222';
    ctx.fillRect(o.x - 1, o.y - 28, 2, 6);
    ctx.beginPath(); ctx.arc(o.x, o.y - 30, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff2a2a';
    ctx.fillRect(o.x - 5, o.y - 18, 3, 3);
    ctx.fillRect(o.x + 2, o.y - 18, 3, 3);
    ctx.fillStyle = '#2b2b2b';
    ctx.fillRect(o.x - 4, o.y - 13, 8, 2);
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(o.x - 11, o.y + 12, 22, 3);
  }

  function drawJump(o) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(o.x, o.y + 10, 24, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#b8c2cc';
    ctx.beginPath();
    ctx.moveTo(o.x - 24, o.y + 8);
    ctx.lineTo(o.x + 24, o.y + 8);
    ctx.lineTo(o.x + 20, o.y - 6);
    ctx.lineTo(o.x - 16, o.y - 6);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(o.x - 14, o.y - 9, 28, 4);
    ctx.fillStyle = '#7c2d12';
    ctx.fillRect(o.x - 10, o.y - 8, 4, 2);
    ctx.fillRect(o.x - 2, o.y - 8, 4, 2);
    ctx.fillRect(o.x + 6, o.y - 8, 4, 2);
  }

  function drawGate(o) {
    const lx = o.cx - o.gap / 2, rx = o.cx + o.gap / 2;
    ctx.fillStyle = '#dd2222';
    ctx.fillRect(lx - 4, o.y - 14, 6, 28);
    ctx.fillStyle = '#ff6666';
    ctx.fillRect(lx - 14, o.y - 3, 14, 6);
    ctx.fillStyle = COL2;
    ctx.fillRect(rx - 2, o.y - 14, 6, 28);
    ctx.fillStyle = '#88a8ff';
    ctx.fillRect(rx, o.y - 3, 14, 6);
    ctx.strokeStyle = o.passed ? '#7a8c98' : '#fff';
    ctx.globalAlpha = 0.28; ctx.lineWidth = 1; ctx.setLineDash([6, 6]);
    ctx.beginPath(); ctx.moveTo(lx, o.y); ctx.lineTo(rx, o.y); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = 1;
  }

  function drawFinish(o) {
    const sq = 12, rows = 2;
    for (let r = 0; r < rows; r++) {
      for (let i = 0; i < W / sq + 1; i++) {
        ctx.fillStyle = ((i + r) % 2 === 0) ? '#111' : '#fff';
        ctx.fillRect(i * sq, o.y - sq + r * sq, sq, sq);
      }
    }
    ctx.fillStyle = '#dd2222';
    ctx.fillRect(0, o.y - sq - 6, 6, sq * rows + 6);
    ctx.fillRect(W - 6, o.y - sq - 6, 6, sq * rows + 6);
    ctx.fillStyle = COL2;
    ctx.font = 'bold 16px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('FINISH', W / 2, o.y + sq + 16);
    ctx.textAlign = 'left';
  }

  function drawYedric(airOffset) {
    const lean = ((keys['ArrowLeft']||keys['a']||held.left)?-1:0) + ((keys['ArrowRight']||keys['d']||held.right)?1:0);
    if (airborne > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(px, PLAYER_Y + SKI_H/2 + 4, 14, 4, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.save();
    ctx.translate(px, PLAYER_Y + airOffset);
    ctx.rotate(lean * 0.16);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, -2, 11, 13, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = COL1;
    ctx.beginPath();
    ctx.ellipse(0, 2, 6, 7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(-10, 0, 4, 7, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10, 0, 4, 7, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -SKI_H/2 - 3, 9, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = COL2;
    ctx.beginPath();
    ctx.moveTo(-6, -SKI_H/2 - 9);
    ctx.lineTo(-10, -SKI_H/2 - 16);
    ctx.lineTo(-3, -SKI_H/2 - 12);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(6, -SKI_H/2 - 9);
    ctx.lineTo(10, -SKI_H/2 - 16);
    ctx.lineTo(3, -SKI_H/2 - 12);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.fillRect(-4, -SKI_H/2 - 5, 2, 3);
    ctx.fillRect(2, -SKI_H/2 - 5, 2, 3);
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(0, -SKI_H/2 + 1, 2.5, 0, Math.PI);
    ctx.stroke();
    ctx.fillStyle = COL2;
    ctx.fillRect(-11, SKI_H/2 - 2, 22, 4);
    ctx.beginPath();
    ctx.moveTo(-11, SKI_H/2 - 2); ctx.lineTo(-13, SKI_H/2 - 4); ctx.lineTo(-11, SKI_H/2 + 2);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(11, SKI_H/2 - 2); ctx.lineTo(13, SKI_H/2 - 4); ctx.lineTo(11, SKI_H/2 + 2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = '#e8eef4'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i = 0; i < 30; i++) {
      const x = (i * 53 + frame * 0.5) % W;
      const y = (i * 97 + frame * spd * 0.6) % H;
      ctx.fillRect(x, y, 2, 2);
    }
    if (airborne === 0) {
      ctx.strokeStyle = 'rgba(170,200,225,0.85)'; ctx.lineWidth = 2;
      const trackLen = 80;
      for (const dx of [-5, 5]) {
        ctx.beginPath();
        ctx.moveTo(px + dx, PLAYER_Y + SKI_H / 2);
        ctx.lineTo(px + dx, PLAYER_Y + SKI_H / 2 + trackLen);
        ctx.stroke();
      }
    }
    const sorted = [...obstacles].sort((a, b) => (a.y || 0) - (b.y || 0));
    for (const o of sorted) {
      if (o.type === 'tree') drawTree(o);
      else if (o.type === 'rock') drawRock(o);
      else if (o.type === 'robot') drawRobot(o);
      else if (o.type === 'jump') drawJump(o);
      else if (o.type === 'gate') drawGate(o);
      else if (o.type === 'finish') drawFinish(o);
    }
    const airOffset = airborne > 0
      ? -Math.sin((1 - airborne / JUMP_AIR_FRAMES) * Math.PI) * 22
      : 0;
    drawYedric(airOffset);

    if (!started) {
      ctx.fillStyle = '#1f2937'; ctx.globalAlpha = 0.85;
      ctx.font = 'bold ' + Math.round(W * 0.045) + 'px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('Press ← / → or buttons to ski', W/2, H/2);
      ctx.font = Math.round(W * 0.035) + 'px system-ui'; ctx.globalAlpha = 0.7;
      ctx.fillText('Swipe or tilt to steer · dodge trees & robots!', W/2, H/2 + 22);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
    ctx.fillStyle = COL2; ctx.globalAlpha = 0.6;
    ctx.font = '11px system-ui'; ctx.textAlign = 'right';
    ctx.fillText('Speed ' + spd.toFixed(1) + 'x', W - 8, H - 8);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
    if (airborne > 0) {
      ctx.fillStyle = COL2; ctx.globalAlpha = 0.85;
      ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'left';
      ctx.fillText('AIR!', 8, 18);
      ctx.globalAlpha = 1;
    }
    if (WIN_DIST > 0 && score >= WIN_DIST - 200 && score < WIN_DIST - 60) {
      ctx.fillStyle = COL2; ctx.globalAlpha = 0.85;
      ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('Finish line incoming!', W/2, 18);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  }

  function loop() {
    if (!started && (keys['ArrowLeft'] || keys['ArrowRight'] || keys['a'] || keys['d'] || held.left || held.right)) started = true;
    if (running) step(); draw(); requestAnimationFrame(loop);
  }
  document.getElementById('restart').addEventListener('click', reset);
  reset(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
