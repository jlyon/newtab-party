<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>__GAME_NAME__</title>
<style>
  :root { --primary: __PRIMARY_COLOR__; --secondary: __SECONDARY_COLOR__; --bg: __BACKGROUND_COLOR__; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; user-select: none; -webkit-touch-callout: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; }
  h1 { margin: 0; font-size: clamp(14px, 4vw, 22px); letter-spacing: 2px; text-transform: uppercase; }
  #hud { display: flex; gap: 18px; font-size: clamp(11px, 3vw, 14px); opacity: 0.9; }
  canvas { border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    width: min(95vw, calc((100dvh - 150px) * 0.667)); height: auto; display: block; background: #2a221c; }
  #controls { display: flex; gap: 12px; margin-top: 4px; }
  .btn { height: 56px; min-width: 120px; font-size: 18px; font-weight: 700; letter-spacing: 1px;
    background: var(--secondary); color: var(--primary); border: 2px solid var(--primary);
    border-radius: 8px; cursor: pointer; font-family: inherit; user-select: none; -webkit-touch-callout: none; }
  .btn:active, .btn.held { background: var(--primary); color: var(--secondary); }
  .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.9); flex-direction: column; text-align: center; padding: 20px; z-index: 10; }
  #overlay { display: none; }
  .card { max-width: 440px; }
  .card h2 { color: var(--primary); font-size: clamp(22px,6vw,36px); margin: 0 0 14px; letter-spacing: 2px; text-transform: uppercase; }
  .card p { color: rgba(255,255,255,0.55); font-size: 13px; line-height: 1.6; margin: 0 0 24px; }
  .card .msg { color: #fff; font-style: italic; }
  .start-btn { padding: 12px 36px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
    background: var(--primary); color: var(--secondary); border: none; cursor: pointer; border-radius: 6px; font-family: inherit; }
  .start-btn:hover { opacity: 0.88; }
  body:not(.touch) #controls { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <h1>__GAME_NAME__</h1>
  <div id="hud">
    <!-- ── GAME-SPECIFIC SECTION — customize HUD label ── -->
    <span>__PLAYER_NAME__</span>
    <!-- ── END GAME-SPECIFIC SECTION ── -->
    <span id="score">Chops: 0</span>
    <span id="hi">Best: 0</span>
  </div>
  <canvas id="game" width="360" height="540"></canvas>
  <div id="controls">
    <button class="btn" id="btnL">CHOP ◀</button>
    <button class="btn" id="btnR">▶ CHOP</button>
  </div>
</div>

<div class="overlay" id="start-overlay">
  <div class="card">
    <h2>__GAME_NAME__</h2>
    <!-- ── GAME-SPECIFIC SECTION — customize start screen text ── -->
    <p id="controls-hint">Tap CHOP ◀ / ▶ (or ← →) to chop &amp; switch sides.<br>Dodge the branches — avoid __ENEMY_NAME__ on the trunk.<br>Keep chopping before the stamina bar runs dry. Endless. Don't drop.</p>
    <!-- ── END GAME-SPECIFIC SECTION ── -->
    <button class="start-btn" id="start-btn">▶ Start chopping</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="overTitle">Timber!</h2>
    <p class="msg" id="overMsg"></p>
    <p id="overScore"></p>
    <button class="start-btn" id="restart">Chop again</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hi');
  const overlay = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const startOverlay = document.getElementById('start-overlay');

  const css = getComputedStyle(document.documentElement);
  const COL1 = css.getPropertyValue('--primary').trim();
  const COL2 = css.getPropertyValue('--secondary').trim();
  const W = canvas.width, H = canvas.height;

  /* ── GAME-SPECIFIC SECTION — customize for user's theme ── */
  const PLAYER_NAME = '__PLAYER_NAME__';
  // Obstacles that appear on the branches — replace with thematic enemies
  const RIVALS = [
    { name: '__ENEMY_NAME__', color: '#8B4513' },
    { name: '__ENEMY_NAME__', color: '#6B3410' },
    { name: '__ENEMY_NAME__', color: '#A0522D' },
    { name: '__ENEMY_NAME__', color: '#7a4a25' },
  ];
  // Stamina / timing constants — feel free to tune
  const STAMINA_MAX = 100;
  const STAMINA_PER_CHOP = 16;
  const DRAIN_BASE = 14;        // stamina lost per second at start
  const DRAIN_RAMP = 0.45;      // extra drain per second, per chop scored
  // Tree geometry constants
  const SEG_H = 56;
  const TRUNK_W = 88;
  const TRUNK_X = (W - TRUNK_W) / 2;
  const CENTER = W / 2;
  const GROUND_Y = H - 34;
  const SAFE_START = 3;         // bottom segments guaranteed branch-free
  // End messages
  const MSG_TOO_SLOW = PLAYER_NAME + ' ran out of steam. Rest is for the weak.';
  const MSG_HIT = (rival) => 'A ' + rival + ' took out ' + PLAYER_NAME + '. Brutal.';
  /* ── END GAME-SPECIFIC SECTION ── */

  const VISIBLE = Math.ceil(H / SEG_H) + 2;
  let segs, side, score, hiScore = 0, stamina, running, started, last;
  let chopAnim = 0;
  let shake = 0;
  let lastRival = '';

  function genBranch(belowBranch) {
    const roll = Math.random();
    if (roll < 0.42) return 'none';
    let s = Math.random() < 0.5 ? 'left' : 'right';
    if (s === belowBranch) s = (s === 'left') ? 'right' : 'left';
    return s;
  }
  function makeSeg(branch) {
    const r = RIVALS[(Math.random() * RIVALS.length) | 0];
    return { branch, rival: r };
  }

  function reset() {
    segs = [];
    for (let i = 0; i < VISIBLE; i++) {
      const branch = i < SAFE_START ? 'none' : genBranch(segs.length ? segs[segs.length - 1].branch : 'none');
      segs.push(makeSeg(branch));
    }
    side = 'left';
    score = 0;
    stamina = STAMINA_MAX;
    running = true;
    chopAnim = 0; shake = 0;
    overlay.style.display = 'none';
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = 'Chops: ' + score;
    hiEl.textContent = 'Best: ' + hiScore;
  }

  // Endless/continuous: score is raw chop count. SCORE_SCALE normalizes the posted
  // value so a strong run (~60 chops) lands near 1000; mediocre = low hundreds.
  // On-screen "Chops"/"Best" stay raw counts — only the posted score is scaled.
  const SCORE_SCALE = 16;
  let _hi = 0;
  // Always posts the run's score so the arcade can offer the leaderboard on any
  // global-top-10 score, not just a new local best. _hi is kept only for display.
  function postHi(n) {
    n = Math.round(n * SCORE_SCALE) || 0;
    if (n > _hi) _hi = n;
    try { window.parent.postMessage({ highScore: n }, '*'); } catch (e) {}
  }

  function endGame(reason) {
    running = false;
    if (score > hiScore) hiScore = score;
    postHi(score);
    overTitle.textContent = reason === 'slow' ? 'Out of gas!' : 'Timber!';
    overMsg.textContent = reason === 'slow' ? MSG_TOO_SLOW : MSG_HIT(lastRival);
    const best = score >= hiScore && score > 0;
    overScore.textContent = 'Chops: ' + score + (best ? ' — new personal best!' : '  ·  Best: ' + hiScore);
    updateHud();
    overlay.style.display = 'flex';
  }

  function chop(dir) {
    if (!running) return;
    side = dir;
    segs.shift();
    const below = segs[segs.length - 1].branch;
    segs.push(makeSeg(genBranch(below)));
    chopAnim = 8; shake = 6;
    const bottom = segs[0];
    if (bottom.branch === side) { lastRival = bottom.rival.name; endGame('hit'); return; }
    score++;
    stamina = Math.min(STAMINA_MAX, stamina + STAMINA_PER_CHOP);
    updateHud();
  }

  // ---- input ----
  function press(dir, el) {
    if (!started) return;
    chop(dir);
    el.classList.add('held');
    setTimeout(() => el.classList.remove('held'), 90);
  }
  const btnL = document.getElementById('btnL');
  const btnR = document.getElementById('btnR');
  function wire(el, dir) {
    el.addEventListener('mousedown', e => { e.preventDefault(); press(dir, el); });
    el.addEventListener('touchstart', e => { e.preventDefault(); press(dir, el); }, { passive: false });
  }
  wire(btnL, 'left');
  wire(btnR, 'right');

  canvas.addEventListener('touchstart', e => {
    if (!started || !running) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    chop(x < rect.width / 2 ? 'left' : 'right');
  }, { passive: false });
  canvas.addEventListener('mousedown', e => {
    if (!started || !running) return;
    const rect = canvas.getBoundingClientRect();
    chop((e.clientX - rect.left) < rect.width / 2 ? 'left' : 'right');
  });

  addEventListener('keydown', e => {
    if (e.key === 'Enter' && overlay.style.display === 'flex') { document.getElementById('restart').click(); return; }
    if (!started) return;
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); press('left', btnL); }
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); press('right', btnR); }
  });

  function grabFocus(){ try{ window.focus(); }catch(e){} }
  window.addEventListener('load', grabFocus);
  window.addEventListener('pointerdown', grabFocus);
  window.addEventListener('touchstart', () => document.body.classList.add('touch'), { once: true, passive: true });

  document.getElementById('start-btn').addEventListener('click', () => {
    startOverlay.style.display = 'none';
    grabFocus();
    reset(); started = true; last = performance.now();
  });
  document.getElementById('restart').addEventListener('click', () => {
    grabFocus();
    reset(); started = true; last = performance.now();
  });

  // ---- drawing ----
  function drawSeg(s, i, sx) {
    const top = GROUND_Y - (i + 1) * SEG_H;
    // trunk block
    ctx.fillStyle = '#7a4a25';
    ctx.fillRect(TRUNK_X + sx, top, TRUNK_W, SEG_H);
    ctx.fillStyle = '#5e3719';
    ctx.fillRect(TRUNK_X + sx, top, 8, SEG_H);
    ctx.fillRect(TRUNK_X + TRUNK_W - 8 + sx, top, 8, SEG_H);
    // bark lines
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(TRUNK_X + 26 + sx, top); ctx.lineTo(TRUNK_X + 30 + sx, top + SEG_H);
    ctx.moveTo(TRUNK_X + 58 + sx, top); ctx.lineTo(TRUNK_X + 54 + sx, top + SEG_H);
    ctx.stroke();
    // branch + obstacle
    if (s.branch !== 'none') {
      const r = s.rival;
      const bw = 78, bh = 34, by = top + (SEG_H - bh) / 2;
      const bx = s.branch === 'left' ? TRUNK_X - bw + sx : TRUNK_X + TRUNK_W + sx;
      // limb
      ctx.fillStyle = '#5e3719';
      ctx.fillRect(s.branch === 'left' ? bx + bw - 14 : bx, by + bh / 2 - 4, 14, 8);
      // obstacle blob
      ctx.fillStyle = r.color;
      roundRect(bx, by, bw, bh, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.stroke();
      // label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(r.name, bx + bw / 2, by + bh / 2);
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawPlayer(sx) {
    const onLeft = side === 'left';
    const bx = onLeft ? TRUNK_X - 54 : TRUNK_X + TRUNK_W + 4;
    const by = GROUND_Y - 64;
    const swing = chopAnim > 0 ? (chopAnim / 8) : 0;
    ctx.save();
    ctx.translate(bx + 25 + sx, by + 32);
    if (!onLeft) ctx.scale(-1, 1);
    // body
    ctx.fillStyle = COL2;
    roundRect(-18, -8, 34, 40, 10); ctx.fill();
    // chest highlight
    ctx.fillStyle = COL1;
    roundRect(-10, 6, 18, 22, 7); ctx.fill();
    // head
    ctx.fillStyle = COL2;
    ctx.beginPath(); ctx.arc(-4, -16, 15, 0, Math.PI * 2); ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-9, -18, 2.6, 0, Math.PI * 2); ctx.fill();
    // axe
    ctx.save();
    ctx.translate(14, -2);
    ctx.rotate(-0.5 - swing * 1.1);
    ctx.strokeStyle = '#caa472'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(26, 0); ctx.stroke();
    ctx.fillStyle = '#9aa0a6';
    roundRect(24, -9, 14, 18, 3); ctx.fill();
    ctx.restore();
    ctx.restore();
  }

  function drawStamina() {
    const pad = 14, barW = W - pad * 2, barH = 12, y = 10;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(pad, y, barW, barH, 6); ctx.fill();
    const frac = Math.max(0, stamina / STAMINA_MAX);
    ctx.fillStyle = frac < 0.25 ? '#c8102e' : COL1;
    if (frac > 0) { roundRect(pad, y, barW * frac, barH, 6); ctx.fill(); }
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
    roundRect(pad, y, barW, barH, 6); ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // ground
    ctx.fillStyle = '#3c2d1f';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    const sx = shake > 0 ? (Math.random() - 0.5) * shake : 0;
    for (let i = segs.length - 1; i >= 0; i--) drawSeg(segs[i], i, sx);
    drawPlayer(sx);
    drawStamina();
    if (started && !running) return;
    if (!started) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
    }
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - (last || now)) / 1000);
    last = now;
    if (running && started) {
      const drain = DRAIN_BASE + DRAIN_RAMP * score;
      stamina -= drain * dt;
      if (stamina <= 0) { stamina = 0; endGame('slow'); }
    }
    if (chopAnim > 0) chopAnim--;
    if (shake > 0) shake -= 0.6;
    draw();
    requestAnimationFrame(loop);
  }

  // boot
  reset(); running = false; started = false;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
