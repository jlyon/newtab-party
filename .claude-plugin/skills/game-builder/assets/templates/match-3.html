<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>__GAME_NAME__</title>
<style>
  :root { --primary: __PRIMARY_COLOR__; --secondary: __SECONDARY_COLOR__; --bg: __BACKGROUND_COLOR__; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 16px 8px; gap: 10px; }
  h1 { margin: 0; font-size: clamp(15px, 4vw, 22px); letter-spacing: 2px; }
  #hud { display: flex; gap: 18px; font-size: clamp(12px, 3.2vw, 15px); opacity: 0.9; flex-wrap: wrap; justify-content: center; }
  #hud b { color: var(--secondary); }
  #board { position: relative; border-radius: 8px; background: rgba(255,255,255,0.05);
    border: 2px solid var(--primary); touch-action: none; }
  .tile {
    position: absolute; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; user-select: none; cursor: pointer;
    transition: left 0.16s ease, top 0.16s ease, transform 0.12s ease, opacity 0.16s ease;
    font-weight: 700; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.18);
  }
  .tile.sel { transform: scale(0.86); box-shadow: 0 0 0 3px var(--secondary), inset 0 -3px 0 rgba(0,0,0,0.18); }
  .tile.clearing { transform: scale(0.1); opacity: 0; }
  #hint { font-size: clamp(10px, 2.5vw, 12px); opacity: 0.45; text-align: center; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: var(--secondary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
  #start-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88); flex-direction: column; text-align: center; padding: 20px; z-index: 10; }
  #start-card { max-width: 420px; }
  #start-card h2 { color: var(--secondary); font-size: clamp(22px,6vw,36px); margin: 0 0 16px; letter-spacing: 2px; }
  #start-card p { color: var(--primary); font-size: 13px; line-height: 1.6; margin: 0 0 28px; opacity: 0.85; }
  #start-btn { padding: 12px 36px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px;
    font-family: inherit; transition: opacity 0.15s; }
  #start-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="wrap">
  <h1>__GAME_NAME__</h1>
  <div id="hud">
    <span>Moves <b id="moves">0</b></span>
    <span>Score <b id="score">0</b></span>
    <span>Best <b id="hi">—</b></span>
  </div>
  <div id="board"></div>
  <div id="hint">Tap a gem then an adjacent one — or swipe — to swap. Line up 3+ to clear.</div>
</div>
<div id="start-overlay">
  <div id="start-card">
    <h2>__GAME_NAME__</h2>
    <p id="controls-hint">Tap a gem then an adjacent one — or swipe — to swap two gems.<br>Line up 3+ of a kind to clear them and rack up cascades before you run out of moves.</p>
    <button id="start-btn">▶ Play</button>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">Out of moves!</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  const boardEl = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const scoreEl = document.getElementById('score');
  const hiEl    = document.getElementById('hi');
  const overlay = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');

  // ===== GAME-SPECIFIC SECTION =====
  const SIZE = 8;                 // grid is SIZE x SIZE
  const MOVE_LIMIT = 25;          // move-limited end condition
  // Tile set: emoji gems. Add/remove to change difficulty (more types = harder).
  const TILES = ['💎','🔶','🟣','🟢','🔴','🔵'];
  const TILE_BG = ['#3fd6ff','#ffb13f','#b266ff','#4fd35a','#ff5a5a','#5a8bff'];
  const FLAVOR = 'No moves left — the gems have settled.';
  // ===== END GAME-SPECIFIC SECTION =====

  // SCORING: raw score = sum of points from cleared gems with a cascade multiplier.
  // Each cleared gem in a clear-pass is worth 10 * cascadeStep (1st pass x1, 2nd x2, ...),
  // so chain cascades pay off. A weak run (few/short matches) totals a few hundred raw;
  // a combo-heavy 25-move run racks several thousand raw. SCORE_SCALE maps a STRONG
  // run (~6000 raw) to ≈1000 posted. Pass the RAW running score; never double-scale.
  const SCORE_SCALE = 1 / 6;
  let _hi = 0;
  // Always posts the run's score (only at game over) so the arcade can offer the
  // leaderboard on any global-top-10 score, not just a new local best.
  function postHi(raw){ const n = Math.round((Number(raw)||0) * SCORE_SCALE);
    if (n > _hi) _hi = n;
    try { window.parent.postMessage({ highScore: n }, '*'); } catch(e){} }

  const startOverlay = document.getElementById('start-overlay');
  let grid;            // grid[r][c] = tile type index, or -1 = empty
  let movesLeft, rawScore, busy, done, started;
  let sel = null;      // selected {r,c}

  function cellSize(){ return Math.min(46, Math.floor((Math.min(window.innerWidth - 24, 400)) / SIZE)); }
  let CS = cellSize();
  const GAP = 2;

  function randType(){ return Math.floor(Math.random() * TILES.length); }

  // Fill grid with no pre-existing matches so the player makes the first ones.
  function fillNoMatch(){
    grid = Array.from({length: SIZE}, () => Array(SIZE).fill(-1));
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        let t;
        do { t = randType(); }
        while ((c >= 2 && grid[r][c-1] === t && grid[r][c-2] === t) ||
               (r >= 2 && grid[r-1][c] === t && grid[r-2][c] === t));
        grid[r][c] = t;
      }
    }
  }

  // Returns a boolean grid of all cells that are part of a 3+ run (horiz or vert).
  function findMatches(){
    const m = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    // horizontal
    for (let r = 0; r < SIZE; r++) {
      let run = 1;
      for (let c = 1; c <= SIZE; c++) {
        if (c < SIZE && grid[r][c] !== -1 && grid[r][c] === grid[r][c-1]) { run++; }
        else { if (run >= 3) for (let k = c - run; k < c; k++) m[r][k] = true; run = 1; }
      }
    }
    // vertical
    for (let c = 0; c < SIZE; c++) {
      let run = 1;
      for (let r = 1; r <= SIZE; r++) {
        if (r < SIZE && grid[r][c] !== -1 && grid[r][c] === grid[r-1][c]) { run++; }
        else { if (run >= 3) for (let k = r - run; k < r; k++) m[k][c] = true; run = 1; }
      }
    }
    return m;
  }

  function hasAnyMatch(m){ for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (m[r][c]) return true; return false; }

  const wait = ms => new Promise(res => setTimeout(res, ms));

  // Run all clear/fall/refill cascades after a swap. Returns total cells cleared.
  async function resolve(){
    let cleared = 0, step = 1;
    while (true) {
      const m = findMatches();
      if (!hasAnyMatch(m)) break;
      // score this pass with cascade multiplier
      let count = 0;
      for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (m[r][c]) count++;
      rawScore += count * 10 * step;
      cleared += count;
      scoreEl.textContent = rawScore;
      // mark clearing (animate) then empty
      render(m);
      await wait(170);
      for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (m[r][c]) grid[r][c] = -1;
      // gravity: collapse each column downward
      for (let c = 0; c < SIZE; c++) {
        let write = SIZE - 1;
        for (let r = SIZE - 1; r >= 0; r--) {
          if (grid[r][c] !== -1) { grid[write][c] = grid[r][c]; if (write !== r) grid[r][c] = -1; write--; }
        }
        for (let r = write; r >= 0; r--) grid[r][c] = randType(); // new tiles drop in
      }
      render();
      await wait(170);
      step++;
    }
    return cleared;
  }

  function adjacent(a, b){ return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1; }

  async function trySwap(a, b){
    if (busy || done || !adjacent(a, b)) return;
    busy = true;
    // perform swap
    const tmp = grid[a.r][a.c]; grid[a.r][a.c] = grid[b.r][b.c]; grid[b.r][b.c] = tmp;
    render();
    await wait(170);
    const m = findMatches();
    if (!hasAnyMatch(m)) {
      // invalid: snap back, no move consumed
      const t2 = grid[a.r][a.c]; grid[a.r][a.c] = grid[b.r][b.c]; grid[b.r][b.c] = t2;
      render();
      await wait(170);
      busy = false;
      return;
    }
    // valid swap consumes a move
    movesLeft--;
    movesEl.textContent = movesLeft;
    await resolve();
    busy = false;
    if (movesLeft <= 0) endGame();   // postHi fires once, at game over (in endGame)
  }

  // ---- pointer handling: tap-then-tap and swipe-to-swap ----
  function cellAt(clientX, clientY){
    const rect = boardEl.getBoundingClientRect();
    const x = clientX - rect.left, y = clientY - rect.top;
    const c = Math.floor(x / (CS + GAP)), r = Math.floor(y / (CS + GAP));
    if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return null;
    return { r, c };
  }

  let downCell = null, downX = 0, downY = 0, swiped = false;

  function onDown(e){
    if (!started || busy || done) return;
    const p = e.touches ? e.touches[0] : e;
    const cell = cellAt(p.clientX, p.clientY);
    if (!cell) return;
    downCell = cell; downX = p.clientX; downY = p.clientY; swiped = false;
  }
  function onMove(e){
    if (busy || done || !downCell || swiped) return;
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - downX, dy = p.clientY - downY;
    const thresh = CS * 0.45;
    if (Math.abs(dx) < thresh && Math.abs(dy) < thresh) return;
    swiped = true;
    let target;
    if (Math.abs(dx) > Math.abs(dy)) target = { r: downCell.r, c: downCell.c + (dx > 0 ? 1 : -1) };
    else target = { r: downCell.r + (dy > 0 ? 1 : -1), c: downCell.c };
    if (target.r < 0 || target.r >= SIZE || target.c < 0 || target.c >= SIZE) { downCell = null; return; }
    clearSel();
    const from = downCell; downCell = null;
    trySwap(from, target);
  }
  function onUp(e){
    if (busy || done) { downCell = null; return; }
    if (swiped) { downCell = null; return; }
    const cell = downCell; downCell = null;
    if (!cell) return;
    // tap logic
    if (!sel) { sel = cell; markSel(); }
    else if (sel.r === cell.r && sel.c === cell.c) { clearSel(); }
    else if (adjacent(sel, cell)) { const from = sel; clearSel(); trySwap(from, cell); }
    else { clearSel(); sel = cell; markSel(); }
  }

  function markSel(){ const el = tileEls[sel.r] && tileEls[sel.r][sel.c]; if (el) el.classList.add('sel'); }
  function clearSel(){ if (sel) { const el = tileEls[sel.r] && tileEls[sel.r][sel.c]; if (el) el.classList.remove('sel'); } sel = null; }

  boardEl.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  boardEl.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
  boardEl.addEventListener('touchmove', e => { e.preventDefault(); onMove(e); }, { passive: false });
  boardEl.addEventListener('touchend', e => { e.preventDefault(); onUp(e); }, { passive: false });

  // ---- rendering: absolutely-positioned tiles, animate via transitions ----
  let tileEls = [];   // tileEls[r][c] = DOM node
  function build(){
    CS = cellSize();
    boardEl.style.width  = (SIZE * (CS + GAP) + GAP) + 'px';
    boardEl.style.height = (SIZE * (CS + GAP) + GAP) + 'px';
    boardEl.innerHTML = '';
    tileEls = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const el = document.createElement('div');
        el.className = 'tile';
        el.style.width = el.style.height = CS + 'px';
        el.style.fontSize = Math.round(CS * 0.6) + 'px';
        el.style.left = (GAP + c * (CS + GAP)) + 'px';
        el.style.top  = (GAP + r * (CS + GAP)) + 'px';
        boardEl.appendChild(el);
        tileEls[r][c] = el;
      }
    }
    render();
  }

  function render(clearing){
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const el = tileEls[r][c];
        if (!el) continue;
        const t = grid[r][c];
        if (t === -1) { el.style.opacity = '0'; el.textContent = ''; continue; }
        el.style.opacity = '1';
        el.textContent = TILES[t];
        el.style.background = TILE_BG[t % TILE_BG.length];
        el.classList.toggle('clearing', !!(clearing && clearing[r][c]));
      }
    }
  }

  function endGame(){
    if (done) return;
    done = true;
    postHi(rawScore);
    overTitle.textContent = 'Out of moves!';
    overMsg.textContent = FLAVOR;
    overScore.textContent = 'Final score: ' + Math.round(rawScore * SCORE_SCALE);
    overlay.style.display = 'flex';
  }

  function reset(){
    movesLeft = MOVE_LIMIT; rawScore = 0; busy = false; done = false; sel = null;
    started = true;
    movesEl.textContent = movesLeft;
    scoreEl.textContent = '0';
    hiEl.textContent = _hi > 0 ? _hi : '—';
    overlay.style.display = 'none';
    fillNoMatch();
    build();
  }

  addEventListener('resize', () => { if (!busy) build(); });
  addEventListener('keydown', e => {
    if (e.key === 'Enter' && startOverlay.style.display !== 'none') { document.getElementById('start-btn').click(); return; }
    if (e.key === 'Enter' && overlay.style.display !== 'none') document.getElementById('restart').click();
  });
  document.getElementById('restart').addEventListener('click', reset);
  document.getElementById('start-btn').addEventListener('click', () => {
    startOverlay.style.display = 'none';
    reset();
  });
  // Prime the board behind the start overlay; gameplay input is gated until Play.
  reset();
  started = false;
})();
</script>
</body>
</html>
