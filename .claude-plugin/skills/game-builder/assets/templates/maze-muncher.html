<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>__GAME_NAME__</title>
<style>
  :root { --primary: __PRIMARY_COLOR__; --secondary: __SECONDARY_COLOR__; --bg: __BACKGROUND_COLOR__; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; }
  h1 { margin: 0; font-size: clamp(14px, 4vw, 22px); letter-spacing: 2px; }
  #hud { display: flex; gap: 16px; font-size: clamp(11px, 3vw, 14px); opacity: 0.85; }
  canvas { border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    width: min(92vw, calc(100dvh - 200px)); height: auto; display: block; }
  /* MOBILE-ONLY controls: hidden on desktop, shown only after a touch is detected. */
  #touch-controls { display: none; }
  body.touch #touch-controls { display: flex; flex-direction: column; align-items: center; margin-top: 6px; }
  #dpad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(2, 52px); gap: 6px; }
  .btn { width: 52px; height: 52px; min-width: 48px; min-height: 52px; font-size: 22px;
    border: 2px solid var(--primary); background: rgba(0,0,0,0.3); color: var(--primary); cursor: pointer;
    border-radius: 8px; display: flex; align-items: center; justify-content: center; user-select: none;
    -webkit-touch-callout: none; touch-action: none; }
  .btn:active, .btn.held { background: var(--primary); color: var(--bg); }
  #b-up    { grid-column: 2; grid-row: 1; }
  #b-left  { grid-column: 1; grid-row: 2; }
  #b-down  { grid-column: 2; grid-row: 2; }
  #b-right { grid-column: 3; grid-row: 2; }
  #start-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88); flex-direction: column; text-align: center; padding: 20px; z-index: 10; }
  #start-card { max-width: 420px; }
  #start-card h2 { color: var(--primary); font-size: clamp(22px,6vw,36px); margin: 0 0 16px; letter-spacing: 2px; }
  #start-card p { color: rgba(255,255,255,0.55); font-size: 13px; line-height: 1.6; margin: 0 0 28px; }
  #start-btn { padding: 12px 36px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px;
    font-family: inherit; transition: opacity 0.15s; }
  #start-btn:hover { opacity: 0.85; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); flex-direction: column; text-align: center; padding: 20px; z-index: 10; }
  #overlay h2 { color: var(--secondary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>__GAME_NAME__</h1>
  <div id="hud">
    <span id="lives">Lives: 3</span>
    <span id="score">Score: 0</span>
    <span id="hi">Best: 0</span>
  </div>
  <canvas id="game" width="380" height="420"></canvas>
  <div id="touch-controls">
    <div id="dpad">
      <button class="btn" id="b-up">▲</button>
      <button class="btn" id="b-left">◀</button>
      <button class="btn" id="b-down">▼</button>
      <button class="btn" id="b-right">▶</button>
    </div>
  </div>
</div>
<div id="start-overlay">
  <div id="start-card">
    <h2>__GAME_NAME__</h2>
    <p id="controls-hint">Arrow keys or WASD to move · D-pad or swipe on mobile · Eat every dot, grab pellets to turn the tables · Don't get caught</p>
    <button id="start-btn">▶ Play</button>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">Game over</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl    = document.getElementById('hi');
  const livesEl = document.getElementById('lives');
  const overlay = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const startOverlay = document.getElementById('start-overlay');

  function grabFocus(){ try{ window.focus(); }catch(e){} }
  window.addEventListener('load', grabFocus);
  window.addEventListener('pointerdown', grabFocus);
  window.addEventListener('touchstart', () => document.body.classList.add('touch'), { once: true, passive: true });

  const css = getComputedStyle(document.documentElement);
  const COL_PRIMARY = css.getPropertyValue('--primary').trim();
  const COL_SECONDARY = css.getPropertyValue('--secondary').trim();
  const COL_BG = css.getPropertyValue('--bg').trim();

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME = '__PLAYER_NAME__';
  // Maze grid: rows of equal-length strings. Legend:
  //   '#' wall   '.' dot   'o' power pellet   ' ' empty corridor
  //   'P' player spawn      'G' chaser spawn (one per chaser, extras reuse first found)
  const MAZE = [
    "###################",
    "#o...#.......#...o#",
    "#.##.#.#####.#.##.#",
    "#.................#",
    "#.##.#.##.##.#.##.#",
    "#....#..#.#..#....#",
    "####.##.#.#.##.####",
    "#......#.G.#......#",
    "####.#.#####.#.####",
    "#....#...G...#....#",
    "#.##.###.#.###.##.#",
    "#.................#",
    "#.##.#.#####.#.##.#",
    "#o.#.....P.....#.o#",
    "#.##.#.#####.#.##.#",
    "#.................#",
    "###################",
  ];
  const CHASER_COUNT  = 3;                       // how many chasers roam the maze
  const CHASER_COLORS = ['#ff5566', '#33ccff', '#ffaa33'];  // one color per chaser (cycles if fewer)
  const FRIGHT_MS     = 6000;                    // how long pellets keep chasers frightened/edible
  const LIVES         = 3;                       // lives before game over
  const PLAYER_SPEED  = 5.2;                     // player cells/sec
  const CHASER_SPEED  = 4.4;                     // chaser cells/sec (slightly slower than player)
  const FRIGHT_SPEED  = 2.8;                     // chaser cells/sec while frightened
  const CHASE_CHANCE  = 0.78;                    // odds a chaser steers toward player vs. wanders
  const CLEAR_BONUS   = 50;                      // points for clearing every dot (added to score)
  const WIN_MSG  = PLAYER_NAME + ' devoured the whole maze. Flawless feast.';
  const LOSE_MSG = PLAYER_NAME + ' got cornered. The chasers feast tonight.';
  // ==================================

  const COLS = MAZE[0].length;
  const ROWS = MAZE.length;
  const CELL = 20;                 // logical px per cell
  const W = COLS * CELL;           // logical canvas width
  const H = ROWS * CELL;           // logical canvas height
  canvas.width = W; canvas.height = H;

  // Crisp + responsive backing store via DPR.
  function fitCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    const cssW = canvas.getBoundingClientRect().width || W;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssW * (H / W) * dpr);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
  }

  // Mutable grid (dots get consumed). 0 wall, 1 dot, 2 pellet, 3 empty.
  let grid, totalDots, dotsLeft, playerSpawn, chaserSpawns;

  const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const DIRLIST = ['up','down','left','right'];
  const OPP = { up:'down', down:'up', left:'right', right:'left' };

  function parseMaze() {
    grid = [];
    totalDots = 0;
    chaserSpawns = [];
    playerSpawn = { x: 1, y: 1 };
    for (let y = 0; y < ROWS; y++) {
      const row = [];
      for (let x = 0; x < COLS; x++) {
        const ch = MAZE[y][x];
        if (ch === '#') row.push(0);
        else if (ch === '.') { row.push(1); totalDots++; }
        else if (ch === 'o') { row.push(2); totalDots++; }
        else if (ch === 'P') { row.push(3); playerSpawn = { x, y }; }
        else if (ch === 'G') { row.push(3); chaserSpawns.push({ x, y }); }
        else row.push(3);
      }
      grid.push(row);
    }
    if (chaserSpawns.length === 0) chaserSpawns.push({ x: 1, y: 1 });
    dotsLeft = totalDots;
  }

  function isWall(x, y) {
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
    return grid[y][x] === 0;
  }

  let player, chasers, score, lives, running, started, frightUntil, lastT;

  function spawnPlayer() {
    player = { x: playerSpawn.x, y: playerSpawn.y, px: playerSpawn.x, py: playerSpawn.y,
               dir: 'left', want: 'left', mouth: 0 };
  }
  function spawnChasers() {
    chasers = [];
    for (let i = 0; i < CHASER_COUNT; i++) {
      const sp = chaserSpawns[i % chaserSpawns.length];
      chasers.push({ x: sp.x, y: sp.y, px: sp.x, py: sp.y, dir: DIRLIST[i % 4],
                     color: CHASER_COLORS[i % CHASER_COLORS.length], home: { x: sp.x, y: sp.y } });
    }
  }
  function resetPositions() { spawnPlayer(); spawnChasers(); frightUntil = 0; }

  function reset() {
    parseMaze();
    score = 0; lives = LIVES; running = true; started = false; lastT = 0;
    resetPositions();
    overlay.style.display = 'none';
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = 'Score: ' + score;
    hiEl.textContent = 'Best: ' + Math.round(_hi);
    livesEl.textContent = 'Lives: ' + lives;
  }

  // SCORING: raw = dots + pellets + chasers eaten + clear bonus (on win).
  // A dot = 1, pellet = 1, eaten chaser = +5 (handled in eatChaser), clear bonus = CLEAR_BONUS.
  // A full clear of this maze is ~118 dots/pellets + a couple chaser eats + bonus ≈ 180 raw.
  // SCORE_SCALE ~5.5 puts a strong full-clear run near 1000 on the shared leaderboard.
  const SCORE_SCALE = 5.5;
  let _hi = 0;
  function postHi(raw) {
    const n = Math.round((Number(raw) || 0) * SCORE_SCALE);
    if (n > _hi) _hi = n;
    try { window.parent.postMessage({ highScore: n }, '*'); } catch(e) {}
  }

  function endGame(won) {
    running = false;
    postHi(score);          // PROGRESS IS THE SCORE: post on BOTH win and loss.
    overTitle.textContent = won ? 'You win!' : 'Game over';
    overMsg.textContent = won ? WIN_MSG : LOSE_MSG;
    overScore.textContent = 'Score: ' + score + '  ·  Best: ' + Math.round(_hi);
    updateHud();
    overlay.style.display = 'flex';
  }

  function setDir(d) {
    if (!running) return;
    started = true;
    player.want = d;
  }

  // Snap test: an entity sitting exactly on a cell center can change direction.
  function atCenter(e) { return Math.abs(e.px - e.x) < 0.001 && Math.abs(e.py - e.y) < 0.001; }

  function moveEntity(e, speed, dt) {
    // Move continuously toward (x,y) target cell; pick next cell when centered.
    const step = speed * dt;
    const tx = e.x, ty = e.y;
    let dx = tx - e.px, dy = ty - e.py;
    const dist = Math.abs(dx) + Math.abs(dy);
    if (dist <= step) { e.px = tx; e.py = ty; }
    else { e.px += Math.sign(dx) * step; e.py += Math.sign(dy) * step; }
  }

  function tryAdvance(e, dir) {
    const [ddx, ddy] = DIRS[dir];
    const nx = e.x + ddx, ny = e.y + ddy;
    if (isWall(nx, ny)) return false;
    e.x = nx; e.y = ny; e.dir = dir;
    return true;
  }

  function updatePlayer(dt) {
    if (atCenter(player)) {
      // Eat whatever is in the current cell.
      const c = grid[player.y][player.x];
      if (c === 1) { grid[player.y][player.x] = 3; dotsLeft--; score++; }
      else if (c === 2) { grid[player.y][player.x] = 3; dotsLeft--; score++; frightUntil = performance.now() + FRIGHT_MS; }
      if (dotsLeft <= 0) { score += CLEAR_BONUS; updateHud(); endGame(true); return; }
      // Turn if the wanted direction is open; else keep going if possible.
      if (player.want !== player.dir && tryAdvance(player, player.want)) {}
      else if (!tryAdvance(player, player.dir)) { /* blocked: idle at center */ }
      updateHud();
    }
    moveEntity(player, PLAYER_SPEED, dt);
  }

  function chaserChoose(ch, frightened) {
    // Build list of open neighbors, excluding reverse unless dead-end.
    const opts = [];
    for (const d of DIRLIST) {
      const [ddx, ddy] = DIRS[d];
      if (!isWall(ch.x + ddx, ch.y + ddy)) opts.push(d);
    }
    let choices = opts.filter(d => d !== OPP[ch.dir]);
    if (choices.length === 0) choices = opts;          // dead end → reverse
    if (choices.length === 0) return ch.dir;

    const wander = Math.random() > CHASE_CHANCE;
    if (wander || choices.length === 1) {
      return choices[(Math.random() * choices.length) | 0];
    }
    // Score each choice by distance to player; chase = minimize, flee = maximize.
    let best = choices[0], bestVal = frightened ? -Infinity : Infinity;
    for (const d of choices) {
      const [ddx, ddy] = DIRS[d];
      const nx = ch.x + ddx, ny = ch.y + ddy;
      const dist = (nx - player.x) * (nx - player.x) + (ny - player.y) * (ny - player.y);
      if (frightened ? dist > bestVal : dist < bestVal) { bestVal = dist; best = d; }
    }
    return best;
  }

  function updateChasers(dt, frightened) {
    const speed = frightened ? FRIGHT_SPEED : CHASER_SPEED;
    for (const ch of chasers) {
      if (atCenter(ch)) {
        const dir = chaserChoose(ch, frightened);
        tryAdvance(ch, dir);
      }
      moveEntity(ch, speed, dt);
    }
  }

  function checkCollisions(frightened) {
    for (const ch of chasers) {
      const dx = ch.px - player.px, dy = ch.py - player.py;
      if (dx * dx + dy * dy < 0.45 * 0.45) {
        if (frightened) {
          // Eat the chaser: big score, send home.
          score += 5;
          ch.x = ch.home.x; ch.y = ch.home.y; ch.px = ch.home.x; ch.py = ch.home.y; ch.dir = 'up';
          updateHud();
        } else {
          loseLife();
          return;
        }
      }
    }
  }

  function loseLife() {
    lives--;
    updateHud();
    if (lives <= 0) { endGame(false); return; }
    resetPositions();
    started = false;   // brief pause until next input/auto-resume
  }

  function update(now) {
    if (!started) return;
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;
    const frightened = now < frightUntil;
    updatePlayer(dt);
    if (!running) return;
    updateChasers(dt, frightened);
    checkCollisions(frightened);
  }

  // ---------- rendering ----------
  function draw(now) {
    ctx.clearRect(0, 0, W, H);
    // walls + dots
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const cx = x * CELL, cy = y * CELL;
        const c = grid[y][x];
        if (c === 0) {
          ctx.fillStyle = COL_PRIMARY; ctx.globalAlpha = 0.22;
          ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
          ctx.globalAlpha = 1;
        } else if (c === 1) {
          ctx.fillStyle = COL_SECONDARY;
          ctx.beginPath(); ctx.arc(cx + CELL/2, cy + CELL/2, 2.2, 0, Math.PI*2); ctx.fill();
        } else if (c === 2) {
          const pulse = 0.7 + Math.sin(now / 200) * 0.3;
          ctx.fillStyle = COL_SECONDARY;
          ctx.beginPath(); ctx.arc(cx + CELL/2, cy + CELL/2, 5 * pulse, 0, Math.PI*2); ctx.fill();
        }
      }
    }
    const frightened = now < frightUntil;
    // chasers
    for (const ch of chasers) {
      const cx = ch.px * CELL + CELL/2, cy = ch.py * CELL + CELL/2, r = CELL/2 - 2;
      ctx.fillStyle = frightened
        ? (Math.floor(now / 250) % 2 ? '#ffffff' : '#3344cc')
        : ch.color;
      ctx.beginPath();
      ctx.arc(cx, cy - 1, r, Math.PI, 0);
      ctx.lineTo(cx + r, cy + r);
      // wavy skirt
      for (let i = 0; i < 3; i++) {
        ctx.lineTo(cx + r - (r * 2/3) * (i + 0.5), cy + r - (i % 2 === 0 ? 4 : 0));
        ctx.lineTo(cx + r - (r * 2/3) * (i + 1), cy + r);
      }
      ctx.closePath(); ctx.fill();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 4, cy - 2, 2.6, 0, Math.PI*2); ctx.arc(cx + 4, cy - 2, 2.6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = frightened ? '#3344cc' : COL_BG;
      ctx.beginPath(); ctx.arc(cx - 4, cy - 2, 1.2, 0, Math.PI*2); ctx.arc(cx + 4, cy - 2, 1.2, 0, Math.PI*2); ctx.fill();
    }
    // player (muncher) with animated mouth
    const pcx = player.px * CELL + CELL/2, pcy = player.py * CELL + CELL/2, pr = CELL/2 - 1;
    player.mouth = (player.mouth + 0.25) % (Math.PI);
    const open = started && running ? Math.abs(Math.sin(player.mouth)) * 0.32 : 0.05;
    let a0, a1;
    if (player.dir === 'right') { a0 = open; a1 = -open; }
    else if (player.dir === 'left') { a0 = Math.PI + open; a1 = Math.PI - open; }
    else if (player.dir === 'up') { a0 = -Math.PI/2 + open; a1 = -Math.PI/2 - open; }
    else { a0 = Math.PI/2 + open; a1 = Math.PI/2 - open; }
    ctx.fillStyle = COL_PRIMARY;
    ctx.beginPath();
    ctx.moveTo(pcx, pcy);
    ctx.arc(pcx, pcy, pr, a0, a1 + Math.PI*2);
    ctx.closePath(); ctx.fill();

    if (!started && running) {
      ctx.fillStyle = COL_PRIMARY; ctx.globalAlpha = 0.75;
      ctx.font = Math.round(W * 0.05) + 'px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('Move to start', W/2, H/2 - 40);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  }

  function loop(now) {
    if (!lastT) lastT = now;
    update(now);
    draw(now);
    requestAnimationFrame(loop);
  }

  // ---------- input ----------
  addEventListener('keydown', e => {
    const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                  w:'up', s:'down', a:'left', d:'right', W:'up', S:'down', A:'left', D:'right' };
    if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
    if (e.key === 'Enter') {
      if (startOverlay.style.display !== 'none') document.getElementById('start-btn').click();
      else if (overlay.style.display !== 'none') document.getElementById('restart').click();
    }
  });

  // Hold-button helper: same desired-direction the keys set.
  function holdButton(el, dir) {
    const press = e => { e.preventDefault(); el.classList.add('held'); setDir(dir); };
    const release = e => { if (e) e.preventDefault(); el.classList.remove('held'); };
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('touchend', release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
  }
  holdButton(document.getElementById('b-up'), 'up');
  holdButton(document.getElementById('b-down'), 'down');
  holdButton(document.getElementById('b-left'), 'left');
  holdButton(document.getElementById('b-right'), 'right');

  // Swipe on canvas to set direction.
  let swipeStart = null;
  canvas.addEventListener('touchstart', e => { swipeStart = [e.touches[0].clientX, e.touches[0].clientY]; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!swipeStart) return;
    const dx = e.changedTouches[0].clientX - swipeStart[0];
    const dy = e.changedTouches[0].clientY - swipeStart[1];
    swipeStart = null;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
    setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  }, { passive: true });

  // ---------- start / restart ----------
  document.getElementById('start-btn').addEventListener('click', () => {
    grabFocus();
    startOverlay.style.display = 'none';
    reset();
    fitCanvas();
    lastT = 0;
    requestAnimationFrame(loop);
  });
  document.getElementById('restart').addEventListener('click', () => {
    grabFocus();
    reset();
    lastT = 0;
  });

  fitCanvas();
  addEventListener('resize', fitCanvas);
  // Initialize state so the first draw before Play has something to render.
  reset();
  running = false;       // loop does not run until Play; this just primes geometry.
})();
</script>
</body>
</html>
