<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>__GAME_NAME__</title>
<style>
  :root { --primary: __PRIMARY_COLOR__; --secondary: __SECONDARY_COLOR__; --bg: __BACKGROUND_COLOR__; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; }
  h1 { margin: 0; font-size: clamp(15px, 4vw, 22px); letter-spacing: 2px; }
  #hud { display: flex; gap: 20px; font-size: clamp(11px, 3vw, 14px); opacity: 0.85; }
  canvas { border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    max-width: 95vw; max-height: calc(100dvh - 80px); width: auto; height: auto; display: block; cursor: pointer; }
  #hint { font-size: clamp(10px, 2.5vw, 13px); opacity: 0.5; }
  #start-overlay {
    position: fixed; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88); flex-direction: column;
    text-align: center; padding: 20px; z-index: 10;
  }
  #start-card { max-width: 420px; }
  #start-card h2 { color: var(--primary); font-size: clamp(22px,6vw,36px); margin: 0 0 16px; letter-spacing: 2px; }
  #start-card p { color: rgba(255,255,255,0.45); font-size: 13px; line-height: 1.6; margin: 0 0 28px; font-style: italic; }
  #start-btn {
    padding: 12px 36px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
    background: var(--primary); color: var(--bg); border: none; cursor: pointer;
    border-radius: 4px; font-family: inherit; transition: opacity 0.15s;
  }
  #start-btn:hover { opacity: 0.85; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: var(--secondary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>__GAME_NAME__</h1>
  <div id="hud">
    <span>Runner: __PLAYER_NAME__</span>
    <span id="score">Score: 0</span>
    <span id="hi">Best: 0</span>
  </div>
  <canvas id="game" width="640" height="210"></canvas>
  <div id="hint">Tap · Space · ↑ to jump &nbsp;|&nbsp; Double-jump allowed</div>
</div>
<div id="start-overlay">
  <div id="start-card">
    <h2>__GAME_NAME__</h2>
    <p id="controls-hint">Space or ↑ to jump · Double-tap for double jump</p>
    <button id="start-btn">▶ Play</button>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">Splat.</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Run again</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl    = document.getElementById('hi');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const startOverlay = document.getElementById('start-overlay');
  document.getElementById('start-btn').addEventListener('click', () => {
    startOverlay.style.display = 'none';
    reset(); started = true; requestAnimationFrame(loop);
  });
  const css = getComputedStyle(document.documentElement);
  const COL1 = css.getPropertyValue('--primary').trim();
  const COL2 = css.getPropertyValue('--secondary').trim();
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H - 30;

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME  = '__PLAYER_NAME__';
  const OBSTACLE_NAME = '__ENEMY_NAME__';    // what __PLAYER_NAME__ is dodging (e.g. "cacti", "tax forms")
  const WIN_SCORE = 0;                        // 0 = endless; set e.g. 2000 for a finish line
  const GRAVITY      = 0.65;
  const JUMP_FORCE   = -13;
  const BASE_SPEED   = 4.5;
  const SPEED_INC    = 0.0007;               // speed ramp per frame
  const DIE_MSG  = PLAYER_NAME + ' ran face-first into a ' + OBSTACLE_NAME + '. Iconic fumble.';
  const WIN_MSG  = PLAYER_NAME + ' outran everything thrown at them. Certified legend.';
  // ==================================

  const PX = 90, PW = 28, PH = 38;
  let py, pvy, jumpsLeft, obsts, frame, spd, score, hiScore = 0, running, started;

  function reset() {
    py = GROUND_Y - PH; pvy = 0; jumpsLeft = 2;
    obsts = []; frame = 0; spd = BASE_SPEED; score = 0;
    running = true; started = false;
    overlay.style.display = 'none'; updateHud();
  }
  function updateHud() {
    scoreEl.textContent = 'Score: ' + score;
    hiEl.textContent = 'Best: ' + hiScore;
  }
  function jump() {
    if (!running) return;
    if (!started) { started = true; return; }
    if (jumpsLeft > 0) { pvy = JUMP_FORCE; jumpsLeft--; }
  }
  function postHi(s) { window.parent.postMessage({ highScore: s }, '*'); }
  function endGame(won) {
    running = false;
    if (score > hiScore) { hiScore = score; postHi(hiScore); }
    overTitle.textContent = won ? 'You win!' : 'Game over';
    overMsg.textContent = won ? WIN_MSG : DIE_MSG;
    overScore.textContent = 'Score: ' + score + (score >= hiScore && score > 0 ? ' — new best!' : '  ·  Best: ' + hiScore);
    updateHud();
    overlay.style.display = 'flex';
  }

  function step() {
    frame++;
    if (!started) return;
    spd += SPEED_INC;
    // physics
    pvy += GRAVITY; py += pvy;
    if (py >= GROUND_Y - PH) { py = GROUND_Y - PH; pvy = 0; jumpsLeft = 2; }
    // spawn obstacles
    const minGap = Math.max(200, 420 - frame * 0.12);
    if (!obsts.length || W - obsts[obsts.length - 1].x > minGap + Math.random() * 200) {
      const tall = Math.random() < 0.3;
      const h = tall ? 52 : 24 + Math.random() * 22;
      const w = 13 + Math.random() * 10;
      obsts.push({ x: W + 10, w, h, y: GROUND_Y - h, tall });
    }
    for (const o of obsts) o.x -= spd;
    obsts = obsts.filter(o => o.x + o.w > -10);
    score = Math.floor(frame * spd * 0.04);
    if (WIN_SCORE > 0 && score >= WIN_SCORE) { endGame(true); return; }
    // collision (shrunk hitbox for fairness)
    for (const o of obsts) {
      if (PX + 6 + PW - 12 > o.x + 3 && PX + 6 < o.x + o.w - 3 && py + 5 + PH - 8 > o.y + 3) {
        endGame(false); return;
      }
    }
    updateHud();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // ground
    ctx.fillStyle = COL1; ctx.fillRect(0, GROUND_Y, W, 2);
    // dashed distance markers
    ctx.fillStyle = COL1; ctx.globalAlpha = 0.2;
    const dashOff = (frame * (spd || BASE_SPEED)) % 80;
    for (let x = -dashOff; x < W; x += 80) ctx.fillRect(x, GROUND_Y - 2, 40, 1);
    ctx.globalAlpha = 1;
    // obstacles
    ctx.fillStyle = COL2;
    for (const o of obsts) {
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.beginPath();
      ctx.moveTo(o.x - 3, o.y);
      ctx.lineTo(o.x + o.w / 2, o.y - (o.tall ? 14 : 9));
      ctx.lineTo(o.x + o.w + 3, o.y);
      ctx.closePath(); ctx.fill();
    }
    // player body
    ctx.fillStyle = COL1;
    ctx.fillRect(PX, py, PW, PH);
    // head (offset right like a dino)
    ctx.fillRect(PX + PW - 6, py - 13, 17, 13);
    // eye
    ctx.fillStyle = '#000'; ctx.fillRect(PX + PW + 4, py - 10, 4, 4);
    // legs (animated when on ground)
    ctx.fillStyle = COL1;
    const onGround = py >= GROUND_Y - PH - 1;
    if (onGround) {
      const lp = Math.floor(frame / 7) % 2;
      ctx.fillRect(PX + (lp ? 14 : 4), py + PH, 8, 10);
      ctx.fillRect(PX + (lp ? 4 : 14), py + PH - 5, 8, 5);
    } else {
      ctx.fillRect(PX + 4, py + PH, 8, 9);
      ctx.fillRect(PX + 16, py + PH, 8, 9);
    }
    // start hint
    if (!started) {
      ctx.fillStyle = COL1; ctx.globalAlpha = 0.6;
      ctx.font = Math.round(W * 0.028) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Tap or press Space to start', W / 2, H / 2 - 14);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  }

  addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); jump(); }
  });
  canvas.addEventListener('click', jump);
  document.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

  function loop() { if (running) step(); draw(); requestAnimationFrame(loop); }
  addEventListener('keydown', e => { if (e.key === 'Enter' && overlay.style.display !== 'none') document.getElementById('restart').click(); });
  document.getElementById('restart').addEventListener('click', () => { reset(); started = true; });
})();
</script>
</body>
</html>
