<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>__GAME_NAME__</title>
<style>
  :root{
    --primary:__PRIMARY_COLOR__;
    --accent:__SECONDARY_COLOR__;
    --bg:__BACKGROUND_COLOR__;
    --panel:#1d1606;
    --good:#6fcf6f;
    --bad:#e05a5a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{touch-action:none;height:100%}
  body{
    background:
      radial-gradient(circle at 20% -10%, rgba(255,255,255,.06), transparent 40%),
      radial-gradient(circle at 80% 0%, rgba(255,255,255,.05), transparent 45%),
      radial-gradient(circle at 50% 120%, #241a06, var(--bg));
    color:#f3e9cf;
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    min-height:100%;padding:10px;user-select:none;overflow-x:hidden;
  }
  h1{
    font-size:clamp(22px,6.5vw,42px);letter-spacing:2px;color:var(--primary);
    text-shadow:0 2px 0 #5a4205, 0 0 22px rgba(255,255,255,.25);
    text-align:center;margin:4px 0 2px;text-transform:uppercase;
  }
  .tag{color:var(--accent);font-size:clamp(11px,3vw,14px);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
  #status{
    min-height:54px;text-align:center;font-size:clamp(14px,4vw,19px);
    max-width:640px;margin:6px auto;line-height:1.4;padding:0 6px;
  }
  #status b{color:var(--primary)}
  .quip{display:inline-block;color:#d8c389;font-style:italic}
  .layout{display:flex;gap:16px;width:100%;max-width:920px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .ladder{display:grid;grid-auto-flow:column;gap:3px;align-content:start}
  .rung{
    font-size:clamp(9px,2.3vw,12px);padding:4px 9px;border-radius:6px;
    background:linear-gradient(180deg,#241b08,#181103);border:1px solid #3a2c08;white-space:nowrap;
    display:flex;justify-content:space-between;gap:10px;min-width:152px;transition:opacity .3s;
  }
  .rung .amt{color:var(--primary);font-weight:bold}
  .rung.lo .amt{color:#caa84a}
  .rung.hi .amt{color:#ffe27a}
  .rung.dead{opacity:.22;text-decoration:line-through}
  .rung.flash{animation:rflash .6s ease}
  @keyframes rflash{0%{background:#5a4205}100%{}}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(380px,93vw);align-content:start}
  .case{
    aspect-ratio:1.18/1;border:none;border-radius:11px;cursor:pointer;position:relative;
    background:
      linear-gradient(160deg,#ffe487 0%,#e3b53c 38%,#9c761a 100%);
    color:#2a2000;font-weight:bold;font-size:clamp(15px,4.5vw,22px);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    box-shadow:0 4px 0 #4a3705, inset 0 2px 3px rgba(255,255,255,.55), inset 0 -6px 10px rgba(80,55,0,.4);
    transition:transform .1s, box-shadow .1s;
  }
  .case::before{content:"";position:absolute;top:0;left:0;right:0;height:42%;
    background:linear-gradient(180deg,rgba(255,255,255,.45),transparent);border-radius:11px 11px 40% 40%}
  .case .lbl{position:relative;z-index:2;text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .case:active{transform:translateY(3px);box-shadow:0 1px 0 #4a3705, inset 0 2px 3px rgba(255,255,255,.5)}
  .case.mine{outline:3px solid var(--primary);box-shadow:0 0 20px rgba(255,255,255,.55), 0 4px 0 #4a3705}
  .case.mine::after{content:"YOURS";position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:1px;color:#3a2c00;z-index:3}
  .case.opening{animation:pop .45s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12) rotate(-3deg)}100%{transform:scale(1)}}
  .case.opened{
    background:radial-gradient(circle at 50% 30%, #1c150b, #0d0905);color:#8a7338;cursor:default;
    box-shadow:inset 0 0 0 1px #2e2410;font-size:clamp(8px,2.4vw,11px);text-align:center;line-height:1.05;padding:3px;
  }
  .case.opened .num{position:absolute;top:2px;left:4px;font-size:9px;color:#5e4f28;z-index:3}
  .case.opened .v{color:var(--accent);display:block;font-size:clamp(9px,2.6vw,12px);font-weight:bold}
  .controls{display:flex;gap:14px;justify-content:center;margin:16px 0 4px;flex-wrap:wrap}
  .btn{border:none;border-radius:12px;padding:14px 28px;font-size:clamp(15px,4vw,20px);font-weight:bold;
    cursor:pointer;min-width:130px;min-height:54px;letter-spacing:1px;user-select:none;-webkit-touch-callout:none;
    text-transform:uppercase;box-shadow:0 4px 0 rgba(0,0,0,.35)}
  .deal{background:linear-gradient(180deg,#8ee08e,#4fae4f);color:#06340c}
  .nodeal{background:linear-gradient(180deg,#f07a7a,#c23c3c);color:#3a0606}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.35)}
  .overlay{position:absolute;inset:0;background:rgba(10,7,1,.93);display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;z-index:20;backdrop-filter:blur(2px)}
  .overlay h2{color:var(--primary);font-size:clamp(20px,6vw,36px);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 18px rgba(255,255,255,.3)}
  .overlay p{max-width:470px;font-size:clamp(13px,3.6vw,17px);line-height:1.55;margin-bottom:18px;color:#e7dcc0}
  .play{background:linear-gradient(180deg,#ffe487,#dfb13a);color:#2a2000;border:none;border-radius:14px;
    padding:16px 42px;font-size:20px;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:1px;box-shadow:0 5px 0 #7c5e12}
  .play:active{transform:translateY(3px);box-shadow:0 2px 0 #7c5e12}
  .offer{color:var(--primary);font-size:clamp(26px,8vw,48px);font-weight:bold;text-shadow:0 0 18px rgba(255,255,255,.35);animation:reveal .5s ease}
  @keyframes reveal{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .wrap{position:relative;width:100%;max-width:940px;display:flex;flex-direction:column;align-items:center}
  .hint{font-size:11px;color:#8a7842;margin-top:10px;letter-spacing:1px}

  /* Banker panel */
  .banker{display:flex;align-items:center;gap:10px;justify-content:center;margin:2px auto 4px;min-height:0}
  .banker .name{font-size:12px;letter-spacing:2px;color:#9c8a52;text-transform:uppercase}
  .thinking{display:flex;flex-direction:column;align-items:center;gap:10px;animation:reveal .3s ease}
  .thinking .calc{font-size:clamp(15px,4.5vw,22px);color:var(--primary);letter-spacing:1px}
  .dots span{animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <h1>__GAME_NAME__</h1>
  <div class="tag" id="tag"></div>
  <div class="banker" id="bankerBar"></div>
  <div id="status"></div>
  <div class="layout">
    <div class="ladder" id="ladder"></div>
    <div class="board" id="board"></div>
  </div>
  <div class="controls" id="controls" style="display:none">
    <button class="btn deal" id="dealBtn">Deal</button>
    <button class="btn nodeal" id="noDealBtn">No Deal</button>
  </div>
  <div class="hint">Tap a case &middot; Enter restarts after the game ends</div>

  <div class="overlay" id="startOverlay">
    <h2>__GAME_NAME__</h2>
    <p id="introText"></p>
    <button class="play" id="playBtn">Play</button>
  </div>
</div>

<script>
(function(){
"use strict";

// =========================================================================
// ===== GAME-SPECIFIC SECTION =============================================
// Everything a builder customizes lives in this block: the case count, the
// prize-ladder values + labels, the banker's name & personality (offer /
// taunt / calculating lines), the intro flavor, and the end-screen rank
// tiers. Change these to re-theme the game; the mechanics below stay generic.
// =========================================================================

// Banker character — who phones in the offers, and what they say.
const BANKER_NAME = "__BANKER_NAME__";          // displayed banker name
const PLAYER_NAME = "__PLAYER_NAME__";           // how the game addresses the player (e.g. "you", "champ")

// How many sealed cases are on the board. The prize ladder below MUST have
// exactly this many entries (one prize per case). Keep it even for a tidy
// 4-wide board layout.
const CASE_COUNT = 16;

// The prize ladder, lowest -> highest. `amt` is the numeric value (also used
// for scoring); `label` is the flavor text shown on the rung and on reveal.
// MUST have exactly CASE_COUNT entries.
const PRIZES = [
  {label:"A handful of pocket lint", amt:1},
  {label:"A vending-machine snack",  amt:50},
  {label:"A decent dinner out",      amt:500},
  {label:"A weekend getaway",        amt:5000},
  {label:"A used car",               amt:25000},
  {label:"A fancy new car",          amt:75000},
  {label:"A down payment",           amt:150000},
  {label:"A starter home",           amt:400000},
  {label:"A nice house",             amt:900000},
  {label:"A small fortune",          amt:2000000},
  {label:"Generational wealth",      amt:5000000},
  {label:"A private island",         amt:12000000},
  {label:"A space ticket",           amt:35000000},
  {label:"A media empire",           amt:90000000},
  {label:"A sports franchise",       amt:250000000},
  {label:"The whole jackpot",        amt:1000000000}
];

// The banker's personality, expressed in three line pools. One is picked at
// random for the matching beat. Use `${BANKER_NAME}` is NOT interpolated here
// — these are plain strings, so just write the name inline if you want it.
const BANKER_OPEN = [   // shown when an offer is revealed
  "Take the cash. Walk away happy.",
  "I'm being generous. Don't push your luck.",
  "Here's a number. Don't overthink it.",
  "You're one bad case from nothing. Deal?",
  "Cash now, no drama. Last warning."
];
const BANKER_TAUNT = [  // shown when the player rejects an offer
  "Bold. Unprofitable, but bold.",
  "No deal? I respect the chaos. Slightly.",
  "Doubling down. Brave choice.",
  "The numbers don't care about your feelings.",
  "We'll see how that works out for you."
];
const CALC_LINES = [    // shown during the dramatic "calculating" pause
  "The banker is calculating",
  "Crunching the numbers",
  "Consulting the spreadsheet",
  "Pretending to think"
];

// Intro / start-overlay flavor and the small tagline under the title.
const TAGLINE = CASE_COUNT + " cases · no mercy";
const INTRO_TEXT = CASE_COUNT + " sealed cases. One holds the jackpot — the "
  + "rest hold next to nothing. Pick a case to keep, open the others, and after "
  + "each round <b>" + BANKER_NAME + "</b> phones in a lowball offer. Deal, or risk "
  + "it all. Greed is a strategy.";
const PLAY_LABEL = "Open the Cases";   // text on the start-overlay Play button
const PICK_PROMPT = "Pick the case you'll carry to the end. Choose wisely.";

// How many cases the player must open before each banker offer. The board
// works down this schedule; once exhausted it opens 1 per round. Tune the
// pace by editing these numbers (they should be feasible for CASE_COUNT).
const SCHEDULE = [5, 4, 3, 2];

// End-screen rank tiers, evaluated high -> low against the final winnings.
// First match wins. Edit the thresholds and copy to re-theme the payoff.
function rankFor(win){
  if(win >= 100000000) return "You took the whole thing. Legendary.";
  if(win >=  10000000) return "Seriously rich. Buy something absurd.";
  if(win >=   1000000) return "A millionaire's cash-out. Not bad at all.";
  if(win >=    100000) return "Comfortable. Suspiciously comfortable.";
  return "Could have gone better. There's always next time.";
}

// SCORE TUNING (see scoreFor below). Raw winnings span $0..$1B, which is wildly
// out of band with other games — a LINEAR map of the jackpot to ~1000 would
// crush normal wins to near-zero. So we post a LOG-COMPRESSED score with NO
// hard ceiling that stays monotonic in winnings:
//   LOG_SCALE * log10(1 + win)  ->  $1k~540, $100k~900, $1M~1080, $10M~1260, $1B~1620.
// A typical good cash-out (~$100k-$1M) lands ~900-1080; a full jackpot ~1620.
// FLAG FOR REVIEW: the LOG_SCALE multiplier is a judgement call — if a $1B
// jackpot scoring ~1.6x a typical win feels too flat (or too steep) relative to
// the other games, retune LOG_SCALE (or swap the log base).
const LOG_SCALE = 180;

// =========================================================================
// ===== END GAME-SPECIFIC SECTION =========================================
// Everything below is generic Deal-or-No-Deal machinery; it should not need
// editing to re-theme the game.
// =========================================================================

let board=[], myCase=null, round=0, offer=0, gameOver=false, phase="pick";
let bestWin=0, toOpenThisRound=0;

const $ = id => document.getElementById(id);
const fmt = n => "$"+n.toLocaleString("en-US");

// Continuous, uncapped, log-compressed skill metric -> shared leaderboard band.
function scoreFor(win){ return Math.round(LOG_SCALE * Math.log10(1 + Math.max(0, win))); }

// Always post the run's final score so the arcade can offer the leaderboard on
// any global-top-10 score, not just a new local best. _hi is kept only for the
// game's own internal best tracking. Integer, guarded by try/catch.
let _hi = 0;
function postHi(v){ v = Math.round(v) || 0; if(v > _hi){ _hi = v; } try{ window.parent.postMessage({highScore:v}, "*"); }catch(e){} }

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function setBanker(){ $("bankerBar").innerHTML = '<span class="name">'+BANKER_NAME+' &middot; The Banker</span>'; }

function buildLadder(){
  const lad=$("ladder"); lad.innerHTML="";
  const rows = Math.ceil(PRIZES.length/2);
  lad.style.gridTemplateRows = "repeat("+rows+",auto)";
  const loCut = Math.floor(PRIZES.length/3);
  const hiCut = PRIZES.length - Math.floor(PRIZES.length/4);
  PRIZES.forEach((p,i)=>{
    const d=document.createElement("div");
    d.className="rung "+(i<loCut?"lo":i>=hiCut?"hi":"");
    d.id="rung"+i;
    d.innerHTML=`<span>${p.label}</span><span class="amt">${fmt(p.amt)}</span>`;
    lad.appendChild(d);
  });
}

function newGame(){
  board = PRIZES.map((p,i)=>({...p, idx:i, opened:false}));
  shuffle(board);
  myCase=null; round=0; offer=0; gameOver=false; phase="pick";
  buildLadder(); setBanker();
  PRIZES.forEach((_,i)=>$("rung"+i).classList.remove("dead"));
  renderBoard();
  $("controls").style.display="none";
  $("status").innerHTML=PICK_PROMPT;
}

function renderBoard(){
  const b=$("board"); b.innerHTML="";
  board.forEach((c,pos)=>{
    const el=document.createElement("button");
    el.className="case";
    if(c.opened){
      el.classList.add("opened");
      el.innerHTML=`<span class="num">#${pos+1}</span><span class="v">${fmt(c.amt)}</span>`;
    }else{
      el.innerHTML=`<span class="lbl">#${pos+1}</span>`;
      if(myCase===pos) el.classList.add("mine");
      el.onclick=()=>onCase(pos);
    }
    b.appendChild(el);
  });
}

function killRung(amt){
  const i=PRIZES.findIndex(p=>p.amt===amt);
  if(i>=0){ const r=$("rung"+i); r.classList.add("flash"); setTimeout(()=>{r.classList.remove("flash");r.classList.add("dead");},400); }
}

function onCase(pos){
  if(gameOver) return;
  if(phase==="pick"){ myCase=pos; phase="open"; startRound(); renderBoard(); return; }
  if(phase==="open"){
    if(pos===myCase || board[pos].opened) return;
    board[pos].opened=true;
    killRung(board[pos].amt);
    renderBoard();
    const cell=$("board").children[pos];
    if(cell) cell.classList.add("opening");
    toOpenThisRound--;
    if(toOpenThisRound>0){
      $("status").innerHTML=`Case popped. Open <b>${toOpenThisRound}</b> more.`;
    }else{
      setTimeout(makeOffer, 450);
    }
  }
}

function remainingValues(){ return board.filter(c=>!c.opened).map(c=>c.amt); }

function startRound(){
  const remainingClosed = board.filter((c,i)=>!c.opened && i!==myCase).length;
  let n = SCHEDULE[round]!==undefined ? SCHEDULE[round] : 1;
  n = Math.min(n, remainingClosed);
  toOpenThisRound=n;
  $("status").innerHTML = round===0
    ? `Case <b>#${myCase+1}</b> is yours. Now open <b>${n}</b> cases to see what you dodged.`
    : `Open <b>${n}</b> case${n>1?"s":""}.`;
}

function makeOffer(){
  // dramatic pause
  phase="calculating";
  $("controls").style.display="none";
  const line = pick(CALC_LINES);
  $("status").innerHTML = `<div class="thinking"><div class="calc">${line}<span class="dots"><span>.</span><span>.</span><span>.</span></span></div></div>`;
  const wait = 1500 + Math.random()*900;
  setTimeout(revealOffer, wait);
}

function revealOffer(){
  const vals = remainingValues();
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  // Offer starts lowball and creeps toward fair value as rounds advance.
  const fairness = 0.35 + 0.55*(round/SCHEDULE.length);
  offer = Math.max(1, Math.round(avg*fairness/100)*100);
  const quip = pick(BANKER_OPEN);
  $("status").innerHTML = `<div class="offer">${fmt(offer)}</div><span class="quip">${BANKER_NAME}: &ldquo;${quip}&rdquo;</span>`;
  $("controls").style.display="flex";
  phase="offer";
}

function acceptDeal(){
  if(phase!=="offer") return;
  $("controls").style.display="none";
  const mine=board[myCase].amt;
  gameOver=true; phase="done";
  let verdict = offer>=mine ? "You out-played the Banker."
    : (mine>=offer*3 ? "Oof. Your case was loaded. The Banker is laughing." : "A respectable cash-out.");
  finish(offer, `<b>DEAL.</b> You pocket <b>${fmt(offer)}</b>. Your case #${myCase+1} held ${fmt(mine)}. ${verdict}`);
}

function rejectDeal(){
  if(phase!=="offer") return;
  $("controls").style.display="none";
  round++;
  const closedOthers = board.filter((c,i)=>!c.opened && i!==myCase).length;
  if(closedOthers<=1){ finalRound(); return; }
  phase="open"; startRound();
  $("status").innerHTML += `<br><span class="quip">${BANKER_NAME}: &ldquo;${pick(BANKER_TAUNT)}&rdquo;</span>`;
}

function finalRound(){
  const otherPos = board.findIndex((c,i)=>!c.opened && i!==myCase);
  phase="done"; gameOver=true;
  const mine=board[myCase].amt, other=board[otherPos].amt;
  board[otherPos].opened=true; killRung(other); renderBoard();
  let line=`Two cases left and you held the line. Your case <b>#${myCase+1}</b> contained <b>${fmt(mine)}</b>. The other had ${fmt(other)}. `;
  line += mine>other ? "You kept the bigger bag." : "The other one was fatter. Brutal.";
  finish(mine, line);
}

function finish(win,msg){
  $("status").innerHTML=msg;
  // Track best raw haul for the on-screen "Best haul" readout, but POST the
  // log-scaled score so the leaderboard stays in the shared band. postHi is
  // monotonic on the scaled value.
  if(win>bestWin){ bestWin=win; }
  postHi(scoreFor(win));
  setTimeout(()=>showEnd(win),700);
}

function showEnd(win){
  const ov=document.createElement("div");
  ov.className="overlay"; ov.id="endOverlay";
  ov.innerHTML=`<h2>${fmt(win)}</h2><p>${rankFor(win)}<br><br>Best haul this session: <b>${fmt(bestWin)}</b></p><button class="play" id="againBtn">Play Again</button>`;
  $("wrap").appendChild(ov);
  $("againBtn").onclick=restart;
}

function restart(){ const ov=$("endOverlay"); if(ov) ov.remove(); newGame(); }

$("tag").innerHTML = TAGLINE;
$("introText").innerHTML = INTRO_TEXT;
$("playBtn").textContent = PLAY_LABEL;

$("dealBtn").onclick=acceptDeal;
$("noDealBtn").onclick=rejectDeal;
$("playBtn").onclick=()=>{ $("startOverlay").remove(); newGame(); };

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if($("endOverlay")) restart();
    else if($("startOverlay")){ $("startOverlay").remove(); newGame(); }
  }
});

buildLadder();
})();
</script>
</body>
</html>
