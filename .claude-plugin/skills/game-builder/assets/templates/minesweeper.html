<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>__GAME_NAME__</title>
<style>
  :root { --primary: __PRIMARY_COLOR__; --secondary: __SECONDARY_COLOR__; --bg: __BACKGROUND_COLOR__; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; touch-action: manipulation; }
  #wrap { display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 16px 8px; gap: 10px; }
  h1 { margin: 0; font-size: clamp(15px, 4vw, 22px); letter-spacing: 2px; }
  #hud { display: flex; gap: 18px; font-size: clamp(11px, 3vw, 14px); opacity: 0.85; flex-wrap: wrap; justify-content: center; }
  #grid { display: grid; gap: 3px; }
  .cell {
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; cursor: pointer; border-radius: 5px; user-select: none;
    border: 2px solid var(--primary);
  }
  .cell.hidden { background: var(--primary); color: var(--bg); font-size: 0; }
  .cell.flagged { background: var(--primary); color: var(--bg); }
  .cell.revealed { border-color: rgba(255,255,255,0.12); cursor: default; background: rgba(255,255,255,0.06); }
  .cell.mine-hit { background: #cc2200 !important; border-color: #ff4400; }
  .cell.mine-shown { background: rgba(255,0,0,0.15); }
  .n1{color:#4488ff} .n2{color:#44cc44} .n3{color:#ff4444} .n4{color:#aa44ff}
  .n5{color:#ff8800} .n6{color:#00cccc} .n7{color:var(--primary)} .n8{color:#888}
  #hint { font-size: clamp(10px, 2.5vw, 12px); opacity: 0.45; text-align: center; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: var(--secondary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>__GAME_NAME__</h1>
  <div id="hud">
    <span>Sapper: __PLAYER_NAME__</span>
    <span id="mines-left">💣 0</span>
    <span id="timer">⏱ 0s</span>
    <span id="hi">Record: —</span>
  </div>
  <div id="grid"></div>
  <div id="hint">Click/tap to reveal · Right-click or long-press to flag 🚩</div>
</div>
<div id="overlay">
  <h2 id="overTitle">Boom.</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  const minesEl  = document.getElementById('mines-left');
  const timerEl  = document.getElementById('timer');
  const hiEl     = document.getElementById('hi');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const gridEl = document.getElementById('grid');

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME = '__PLAYER_NAME__';
  // Presets — pick one or customize:
  // Beginner:     COLS=9,  ROWS=9,  MINES=10
  // Intermediate: COLS=16, ROWS=16, MINES=40
  // Expert:       COLS=30, ROWS=16, MINES=99
  const COLS  = 9;
  const ROWS  = 9;
  const MINES = 10;
  const WIN_MSG  = PLAYER_NAME + ' swept the board. Certified big brain.';
  const LOSE_MSG = PLAYER_NAME + ' found a mine the hard way. Classic.';
  // ==================================

  let board, flagged, revealed, done, firstClick;
  let timerStart, timerVal, timerTick, hiTime = null;

  function reset() {
    board    = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    flagged  = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    done = false; firstClick = true;
    clearInterval(timerTick); timerVal = 0;
    timerEl.textContent = '⏱ 0s';
    minesEl.textContent = '💣 ' + MINES;
    overlay.style.display = 'none';
    render();
  }

  function placeMines(safeR, safeC) {
    let n = 0;
    while (n < MINES) {
      const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
      if (board[r][c] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      board[r][c] = -1; n++;
    }
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c] !== -1)
          board[r][c] = adj(r, c).filter(([nr, nc]) => board[nr][nc] === -1).length;
  }

  function adj(r, c) {
    const out = [];
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r+dr, nc = c+dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) out.push([nr, nc]);
      }
    return out;
  }

  function flood(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;
    if (board[r][c] === 0) adj(r, c).forEach(([nr, nc]) => flood(nr, nc));
  }

  function postHi(s) { window.parent.postMessage({ highScore: s }, '*'); }

  function endGame(won, hitR, hitC) {
    if (done) return;
    done = true;
    clearInterval(timerTick);
    // expose all mines
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c] === -1 && !flagged[r][c]) revealed[r][c] = true;
    render(hitR, hitC);
    if (won) {
      const score = Math.max(1, Math.round(10000 / (timerVal + 1)));
      if (hiTime === null || timerVal < hiTime) { hiTime = timerVal; postHi(score); }
      hiEl.textContent = 'Record: ' + timerVal + 's';
    }
    overTitle.textContent = won ? '🎉 Clear!' : '💥 Boom.';
    overMsg.textContent = won ? WIN_MSG + ' (' + timerVal + 's)' : LOSE_MSG;
    overScore.textContent = won && hiTime === timerVal ? 'New record!' : '';
    overlay.style.display = 'flex';
  }

  function onReveal(r, c) {
    if (done || revealed[r][c] || flagged[r][c]) return;
    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      timerStart = Date.now(); timerVal = 0;
      timerTick = setInterval(() => {
        timerVal = Math.floor((Date.now() - timerStart) / 1000);
        timerEl.textContent = '⏱ ' + timerVal + 's';
      }, 250);
    }
    if (board[r][c] === -1) { revealed[r][c] = true; endGame(false, r, c); return; }
    flood(r, c);
    render();
    const safe = ROWS * COLS - MINES;
    if (revealed.flat().filter(Boolean).length >= safe) endGame(true);
  }

  function onFlag(r, c) {
    if (done || revealed[r][c]) return;
    flagged[r][c] = !flagged[r][c];
    minesEl.textContent = '💣 ' + (MINES - flagged.flat().filter(Boolean).length);
    render();
  }

  let pressTimer = null;

  function cellSize() { return Math.min(40, Math.floor((Math.min(window.innerWidth - 20, 380)) / COLS) - 3); }

  function render(hitR, hitC) {
    const sz = cellSize();
    gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${sz}px)`;
    gridEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement('div');
        el.className = 'cell';
        el.style.width = el.style.height = el.style.fontSize = sz + 'px';
        el.style.fontSize = Math.round(sz * 0.55) + 'px';
        const isHit = r === hitR && c === hitC;
        if (revealed[r][c]) {
          const isMine = board[r][c] === -1;
          el.classList.add('revealed');
          if (isHit) el.classList.add('mine-hit');
          else if (isMine) el.classList.add('mine-shown');
          if (isMine) el.textContent = '💣';
          else if (board[r][c] > 0) { el.textContent = board[r][c]; el.classList.add('n' + board[r][c]); }
        } else if (flagged[r][c]) {
          el.classList.add('flagged'); el.textContent = '🚩';
        } else {
          el.classList.add('hidden');
        }
        el.addEventListener('click', e => { e.preventDefault(); onReveal(r, c); });
        el.addEventListener('contextmenu', e => { e.preventDefault(); onFlag(r, c); });
        el.addEventListener('touchstart', () => {
          pressTimer = setTimeout(() => { onFlag(r, c); pressTimer = null; }, 480);
        }, { passive: true });
        el.addEventListener('touchend', e => {
          if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        });
        el.addEventListener('touchmove', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
        gridEl.appendChild(el);
      }
    }
  }

  addEventListener('keydown', e => {
    if (e.key === 'Enter' && overlay.style.display !== 'none') document.getElementById('restart').click();
  });
  document.getElementById('restart').addEventListener('click', reset);
  reset();
})();
</script>
</body>
</html>
