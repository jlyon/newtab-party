<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Rock Em Sock Em Wrecking Ball</title>
<style>
  :root { --primary: silver; --secondary: black; --bg: navy; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 6px; }
  h1 { margin: 0; font-size: clamp(14px, 4vw, 22px); letter-spacing: 2px; }
  #hud { display: flex; gap: 18px; font-size: clamp(11px, 3vw, 14px); opacity: 0.85; }
  canvas { border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary);
    width: min(600px, 95vw); height: auto; display: block; background: #0a1733; }
  #controls { display: flex; gap: 10px; align-items: center; justify-content: space-between;
    width: min(600px, 95vw); padding: 4px 0; }
  .ctrl-group { display: flex; gap: 8px; }
  .btn {
    padding: 0; width: 60px; height: 52px; font-size: 22px; border: 2px solid var(--primary);
    background: rgba(0,0,0,0.3); color: var(--primary); cursor: pointer; border-radius: 8px;
    user-select: none; display: flex; align-items: center; justify-content: center;
    -webkit-touch-callout: none;
  }
  .btn:active, .btn.held { background: var(--primary); color: var(--bg); }
  #btn-atk { width: 72px; border-color: #fff; color: #fff; font-size: 26px;
    background: rgba(0,0,0,0.6); }
  #btn-atk:active, #btn-atk.held { background: #fff; color: var(--bg); }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: #fff; font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px;
    text-shadow: 0 0 12px var(--primary); }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); max-width: 520px; }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer;
    border-radius: 4px; letter-spacing: 1px; font-weight: bold; }
</style>
</head>
<body>
<div id="wrap">
  <h1>ROCK EM SOCK EM WRECKING BALL</h1>
  <div id="hud">
    <span>Fighter: Uncle Earl</span>
    <span id="score">Score: 0</span>
    <span id="lives">Lives: ♥♥♥</span>
  </div>
  <canvas id="game" width="600" height="340"></canvas>
  <div id="controls">
    <div class="ctrl-group">
      <button class="btn" id="btn-left">←</button>
      <button class="btn" id="btn-right">▶</button>
    </div>
    <button class="btn" id="btn-atk">🥊</button>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">KO!</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Fight again</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const css = getComputedStyle(document.documentElement);
  const COL1 = css.getPropertyValue('--primary').trim();
  const COL2 = css.getPropertyValue('--secondary').trim();
  const W = canvas.width, H = canvas.height;

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME = 'Uncle Earl';
  const ENEMY_NAME  = 'HOA board member';
  const WIN_SCORE   = 300;
  const PLAYER_SPEED = 4;
  const PUNCH_RANGE  = 70;
  const PUNCH_COOLDOWN = 380;
  const ENEMY_SPAWN_MS = 1700;

  const HOA_TITLES = [
    'Karen, Chair of Bylaws',
    'Brad, Lawn Compliance',
    'Linda, Mailbox Audit',
    'Greg, Trash Bin Patrol',
    'Marge, Paint Color Czar',
    'Dale, Fence Height Marshal',
    'Brenda, Quiet Hours Enforcer'
  ];
  const WIN_MSG  = "Uncle Earl reduced the HOA to a stack of strongly-worded letters. The boardroom is his now. Lawn flamingos for everyone.";
  const LOSE_MSG = "Uncle Earl got out-Robert's-Rules-of-Order'd. Motion to revive: denied. They're fining him for bleeding on the carpet.";
  // ==================================

  const FLOOR_Y = H - 50;
  const PW = 32, PH = 52;
  const EW = 26, EH = 44;
  const keys = {};
  const held = { left: false, right: false, atk: false };

  let _hi = 0;
  function postHi(n) {
    n = Math.floor(n) || 0;
    if (n > _hi) { _hi = n; window.parent.postMessage({ highScore: n }, '*'); }
  }

  function holdBtn(id, key) {
    const el = document.getElementById(id);
    const down = e => { e.preventDefault(); held[key] = true; el.classList.add('held'); };
    const up   = e => { e.preventDefault(); held[key] = false; el.classList.remove('held'); };
    el.addEventListener('mousedown', down); el.addEventListener('mouseup', up); el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', down, { passive: false });
    el.addEventListener('touchend', up, { passive: false });
    el.addEventListener('touchcancel', up, { passive: false });
  }
  holdBtn('btn-left', 'left'); holdBtn('btn-right', 'right'); holdBtn('btn-atk', 'atk');
  addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key===' ') e.preventDefault(); });
  addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

  let player, enemies, score, lives, lastPunch, lastSpawn, running, frame;
  let punchTimer = 0;
  let flyingPaper = [];

  function reset() {
    player = { x: W / 2 - PW / 2, y: FLOOR_Y - PH, facing: 1, punching: false };
    enemies = []; score = 0; lives = 3; frame = 0;
    lastPunch = 0; lastSpawn = 0;
    running = true; punchTimer = 0; flyingPaper = [];
    overlay.style.display = 'none'; updateHud();
  }
  function updateHud() {
    scoreEl.textContent = 'Score: ' + score;
    livesEl.textContent = 'Lives: ' + '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3 - lives));
  }
  function endGame(won) {
    running = false;
    postHi(score);
    overTitle.textContent = won ? 'MOTION CARRIED. FISTS PREVAIL.' : 'GAVELED INTO OBLIVION';
    overMsg.textContent = won ? WIN_MSG : LOSE_MSG;
    overScore.textContent = 'Score: ' + score + (score >= _hi && score > 0 ? ' ★ new best!' : '');
    updateHud(); overlay.style.display = 'flex';
  }
  function spawnEnemy() {
    const fromLeft = Math.random() < 0.5;
    const title = HOA_TITLES[Math.floor(Math.random() * HOA_TITLES.length)];
    enemies.push({
      x: fromLeft ? -EW : W,
      y: FLOOR_Y - EH,
      vx: fromLeft ? 1.5 : -1.5,
      hp: 1, flash: 0, title: title
    });
  }
  function rectsHit(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }
  function spawnPaper(x, y) {
    for (let i = 0; i < 6; i++) {
      flyingPaper.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: -Math.random() * 4 - 1,
        life: 40,
        rot: Math.random() * Math.PI * 2
      });
    }
  }

  function step(now) {
    frame++;
    const mv = (keys['arrowleft'] || keys['a'] || held.left ? -1 : 0)
             + (keys['arrowright'] || keys['d'] || held.right ? 1 : 0);
    if (mv !== 0) player.facing = mv;
    player.x = Math.max(0, Math.min(W - PW, player.x + mv * PLAYER_SPEED));

    const wantPunch = keys[' '] || keys['z'] || keys['x'] || held.atk;
    if (wantPunch && now - lastPunch > PUNCH_COOLDOWN) {
      lastPunch = now; punchTimer = 8;
      const px = player.facing > 0 ? player.x + PW : player.x - PUNCH_RANGE;
      for (const e of enemies) {
        if (rectsHit(px, player.y, PUNCH_RANGE, PH, e.x, e.y, EW, EH)) {
          e.hp--; e.flash = 6;
          if (e.hp <= 0) {
            e.dead = true;
            score += 10;
            spawnPaper(e.x + EW/2, e.y + EH/2);
          }
        }
      }
    }
    if (punchTimer > 0) punchTimer--;

    if (now - lastSpawn > ENEMY_SPAWN_MS) { spawnEnemy(); lastSpawn = now; }

    for (const e of enemies) {
      if (!e.dead) {
        const spd = 1.2 + score * 0.003;
        e.x += (player.x > e.x ? spd : -spd);
        if (e.flash > 0) e.flash--;
        if (rectsHit(player.x+4, player.y+4, PW-8, PH-8, e.x, e.y, EW, EH)) {
          e.dead = true; lives--;
          if (lives <= 0) { endGame(false); return; }
        }
      }
    }
    enemies = enemies.filter(e => !e.dead);

    for (const p of flyingPaper) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.2;
      p.rot += 0.2; p.life--;
    }
    flyingPaper = flyingPaper.filter(p => p.life > 0);

    updateHud();
    if (score >= WIN_SCORE) { endGame(true); return; }
  }

  function drawBoardroom() {
    ctx.fillStyle = '#162a55';
    ctx.fillRect(0, 0, W, FLOOR_Y);
    ctx.fillStyle = '#2a1f10';
    ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
    ctx.strokeStyle = '#3d2d18'; ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, FLOOR_Y); ctx.lineTo(x - 30, H); ctx.stroke();
    }
    ctx.fillStyle = '#0a1733';
    ctx.fillRect(40, 30, 200, 110);
    ctx.strokeStyle = COL1; ctx.lineWidth = 2;
    ctx.strokeRect(40, 30, 200, 110);
    ctx.beginPath(); ctx.moveTo(140, 30); ctx.lineTo(140, 140); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(40, 85); ctx.lineTo(240, 85); ctx.stroke();
    ctx.fillStyle = '#1a2e5e';
    ctx.fillRect(50, 110, 18, 30); ctx.fillRect(75, 95, 22, 45); ctx.fillRect(105, 105, 18, 35);
    ctx.fillRect(150, 100, 20, 40); ctx.fillRect(180, 90, 25, 50); ctx.fillRect(215, 110, 18, 30);
    ctx.fillStyle = '#1a2e5e';
    ctx.fillRect(290, 50, 90, 70);
    ctx.strokeStyle = COL1; ctx.strokeRect(290, 50, 90, 70);
    ctx.fillStyle = COL1;
    ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('SYNERGY', 335, 75);
    ctx.font = '7px system-ui';
    ctx.fillText('teamwork', 335, 90);
    ctx.fillText('• excellence', 335, 102);
    ctx.fillStyle = '#3d2d18';
    ctx.fillRect(420, 130, 160, 30);
    ctx.fillStyle = '#5a4426';
    ctx.fillRect(420, 130, 160, 4);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(440, 110, 14, 22); ctx.fillRect(480, 110, 14, 22);
    ctx.fillRect(520, 110, 14, 22); ctx.fillRect(560, 110, 14, 22);
    ctx.fillStyle = '#7a5530';
    ctx.fillRect(495, 138, 24, 6); ctx.fillRect(503, 135, 8, 12);
    ctx.strokeStyle = COL1; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.globalAlpha = 0.5; ctx.lineWidth = 1;
    ctx.strokeRect(10, H - 20, W - 20, 8);
    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.7;
    ctx.fillRect(10, H - 20, Math.min(W - 20, (W - 20) * score / WIN_SCORE), 8);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  function drawUncle(x, y, w, h, facing, punching) {
    ctx.fillStyle = '#8a7a4a';
    ctx.fillRect(x + 3, y + h * 0.72, w * 0.38, h * 0.28);
    ctx.fillRect(x + w - 3 - w * 0.38, y + h * 0.72, w * 0.38, h * 0.28);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 2, y + h - 4, w * 0.4, 4);
    ctx.fillRect(x + w - 2 - w * 0.4, y + h - 4, w * 0.4, 4);
    ctx.fillStyle = COL1;
    ctx.fillRect(x, y + h * 0.32, w, h * 0.42);
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h * 0.6, w * 0.55, h * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e8c4a0';
    ctx.beginPath(); ctx.arc(x + w/2, y + h * 0.18, w * 0.42, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(x + w * 0.25, y + h * 0.22, w * 0.5, 3);
    ctx.fillRect(x + w * 0.22, y + h * 0.13, w * 0.22, 2);
    ctx.fillRect(x + w * 0.56, y + h * 0.13, w * 0.22, 2);
    if (punching) {
      const ax = facing > 0 ? x + w : x - w * 0.7;
      ctx.fillStyle = '#e8c4a0';
      ctx.fillRect(ax, y + h * 0.4, w * 0.7, h * 0.14);
      ctx.fillStyle = COL2;
      ctx.fillRect(facing > 0 ? ax + w * 0.55 : ax - 2, y + h * 0.36, w * 0.25, h * 0.22);
    } else {
      ctx.fillStyle = '#e8c4a0';
      ctx.fillRect(x - 4, y + h*0.38, 6, h * 0.32);
      ctx.fillRect(x + w - 2, y + h*0.38, 6, h * 0.32);
    }
  }

  function drawHOA(e, facing) {
    const x = e.x, y = e.y, w = EW, h = EH;
    const flashed = e.flash > 0;
    ctx.fillStyle = flashed ? '#fff' : '#1a1a1a';
    ctx.fillRect(x + 2, y + h * 0.72, w * 0.38, h * 0.28);
    ctx.fillRect(x + w - 2 - w * 0.38, y + h * 0.72, w * 0.38, h * 0.28);
    ctx.fillStyle = flashed ? '#fff' : '#000';
    ctx.fillRect(x + 1, y + h - 4, w * 0.42, 4);
    ctx.fillRect(x + w - 1 - w * 0.42, y + h - 4, w * 0.42, 4);
    ctx.fillStyle = flashed ? '#fff' : COL2;
    ctx.fillRect(x, y + h * 0.32, w, h * 0.45);
    ctx.fillStyle = flashed ? '#000' : '#eee';
    ctx.fillRect(x + w*0.4, y + h * 0.32, w * 0.2, h * 0.2);
    ctx.fillStyle = flashed ? '#000' : '#a01020';
    ctx.fillRect(x + w*0.45, y + h * 0.32, w * 0.1, h * 0.35);
    ctx.fillStyle = flashed ? '#fff' : '#e8c4a0';
    ctx.beginPath(); ctx.arc(x + w/2, y + h * 0.18, w * 0.4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = flashed ? '#fff' : '#000'; ctx.lineWidth = 1;
    ctx.strokeRect(x + w * 0.22, y + h * 0.14, w * 0.22, 4);
    ctx.strokeRect(x + w * 0.56, y + h * 0.14, w * 0.22, 4);
    ctx.beginPath();
    ctx.moveTo(x + w * 0.44, y + h * 0.16); ctx.lineTo(x + w * 0.56, y + h * 0.16); ctx.stroke();
    const cbx = facing > 0 ? x - 8 : x + w + 2;
    ctx.fillStyle = flashed ? '#000' : '#c8a060';
    ctx.fillRect(cbx, y + h * 0.42, 8, 12);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cbx + 1, y + h * 0.44, 6, 9);
  }

  function draw() {
    drawBoardroom();
    for (const e of enemies) {
      drawHOA(e, player.x > e.x ? 1 : -1);
      if (e.flash > 0) {
        ctx.fillStyle = '#fff';
        ctx.font = '9px system-ui'; ctx.textAlign = 'center';
        ctx.fillText(e.title.split(',')[0], e.x + EW/2, e.y - 4);
        ctx.textAlign = 'left';
      }
    }
    for (const p of flyingPaper) {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = '#fff'; ctx.globalAlpha = Math.min(1, p.life / 30);
      ctx.fillRect(-4, -5, 8, 10);
      ctx.fillStyle = '#000';
      ctx.fillRect(-3, -3, 6, 1); ctx.fillRect(-3, -1, 6, 1); ctx.fillRect(-3, 1, 4, 1);
      ctx.restore(); ctx.globalAlpha = 1;
    }
    drawUncle(player.x, player.y, PW, PH, player.facing, punchTimer > 0);
    if (punchTimer > 4) {
      const ax = player.facing > 0 ? player.x + PW + 24 : player.x - 24;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.arc(ax, player.y + PH * 0.42, 22, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('POW!', ax, player.y + PH * 0.42 + 5);
      ctx.textAlign = 'left'; ctx.globalAlpha = 1;
    }
  }

  function loop(now) {
    if (running) step(now);
    draw(); requestAnimationFrame(loop);
  }
  document.getElementById('restart').addEventListener('click', reset);
  reset(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
