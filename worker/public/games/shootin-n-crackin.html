<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>shootin n crackin</title>
<style>
  :root { --primary: #3b82f6; --secondary: #ff3d8b; --bg: #000; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden; touch-action: none;
  }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 4px; }
  h1 { margin: 0; font-size: clamp(14px, 4vw, 26px); letter-spacing: 2px; color: var(--secondary); text-transform: lowercase; }
  #hud { width: min(min(600px, 95vw), calc((100dvh - 230px) * 0.857)); display: flex; justify-content: space-between; font-size: clamp(11px, 3vw, 14px); opacity: 0.9; gap: 10px; }
  #hud span { white-space: nowrap; }
  canvas { background: #000; border: 1px solid rgba(59,130,246,0.25); box-shadow: 0 4px 24px rgba(0,0,0,0.7); max-width: min(600px, 95vw); max-height: calc(100dvh - 230px); width: auto; height: auto; display: block; }
  #controls { display: flex; align-items: center; justify-content: space-between; width: min(min(600px, 95vw), calc((100dvh - 230px) * 0.857)); padding: 2px 0; }
  @media (pointer: fine) { #controls { display: none; } canvas { max-height: calc(100dvh - 120px); } }
  /* On-screen controls are for touch devices only; revealed after first touch. */
  body:not(.touch) #controls { display: none; }
  .dpad { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .dpad-row { display: flex; gap: 3px; align-items: center; }
  .btn { width: 52px; height: 52px; font-size: 20px; border: 2px solid var(--primary);
    background: rgba(0,0,0,0.4); color: var(--primary); cursor: pointer; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-touch-callout: none; }
  .btn:active, .btn.held { background: var(--primary); color: #000; }
  .dpad-gap { width: 52px; }
  .btn-fire { width: 80px; height: 80px; font-size: 28px; border-color: var(--secondary); color: var(--secondary); border-radius: 50%; }
  .btn-fire:active, .btn-fire.held { background: var(--secondary); color: #000; }
  #overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); flex-direction: column; text-align: center; padding: 20px;
  }
  #overlay h2 { color: var(--secondary); font-size: clamp(22px, 8vw, 38px); margin: 0 0 10px; letter-spacing: 2px; }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay .small { opacity: 0.7; font-size: clamp(11px, 2.5vw, 12px); }
  #overlay button { margin-top: 18px; padding: 10px 22px; font-size: clamp(14px, 4vw, 16px); background: var(--primary); color: var(--bg); border: none; cursor: pointer; letter-spacing: 1px; font-weight: bold; }
  #overlay button:hover { background: var(--secondary); }
</style>
</head>
<body>
<div id="wrap">
  <h1>shootin n crackin</h1>
  <div id="hud">
    <span>Pilot: Pizza Slice</span>
    <span id="score">Score: 0</span>
    <span id="wave">Wave: 1</span>
    <span id="lives">Lives: 3</span>
  </div>
  <canvas id="game" width="600" height="700"></canvas>
  <div id="controls">
    <div class="dpad">
      <div class="dpad-row"><button class="btn" id="btn-up">↑</button></div>
      <div class="dpad-row">
        <button class="btn" id="btn-left">←</button>
        <div class="dpad-gap"></div>
        <button class="btn" id="btn-right">→</button>
      </div>
      <div class="dpad-row"><button class="btn" id="btn-down">↓</button></div>
    </div>
    <button class="btn btn-fire" id="btn-fire">⚡</button>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">audited</h2>
  <p id="overMsg">The IRS auditors got the slice. Tragic.</p>
  <p>Arrow keys / WASD to move &nbsp;·&nbsp; Space to shoot</p>
  <p class="small">Lasers BOUNCE off walls. Bosses every 30s. Stay greasy.</p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  // Self-focus so keyboard works without an extra click (keyboard game).
  function grabFocus(){ try { window.focus(); } catch(e){} }
  window.addEventListener('load', grabFocus);
  window.addEventListener('pointerdown', grabFocus);
  // On-screen controls are mobile-only: reveal on first touch.
  window.addEventListener('touchstart', () => document.body.classList.add('touch'), { once: true, passive: true });

  // High score reporting.
  // SCORE_SCALE normalizes raw in-game score to a leaderboard magnitude where a
  // strong ~60-90s run posts ≈ 1000. Raw great-run score is in the low thousands
  // (10/enemy, 150/boss), so ~0.5 lands a great run near 1000.
  let _hi = 0;
  const SCORE_SCALE = 0.5;   // tuned so a great run ≈ 1000
  function postHi(raw){ const n=Math.round((Number(raw)||0)*SCORE_SCALE); if(n>_hi){_hi=n; try{window.parent.postMessage({highScore:n},'*');}catch(e){}} }

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const waveEl = document.getElementById('wave');
  const overlay = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg = document.getElementById('overMsg');
  const css = getComputedStyle(document.documentElement);
  const PRIMARY = css.getPropertyValue('--primary').trim() || '#3b82f6';
  const SECONDARY = css.getPropertyValue('--secondary').trim() || '#ff3d8b';

  const ENEMY_NAME = 'IRS auditors';
  const WIN_SCORE = 750;
  const ENEMY_SPAWN_MS_BASE = 900;
  const ENEMY_SPEED_MIN = 1.2;
  const ENEMY_SPEED_MAX = 2.6;
  const PLAYER_SPEED = 6;
  const BULLET_SPEED = 9;
  const BULLET_COOLDOWN_MS = 200;
  const BOSS_INTERVAL_MS = 30000;
  const WAVE_INTERVAL_MS = 10000;
  const TRAIL_SPAWN_MS = 28;
  const BULLET_BOUNCES = 3;

  const keys = {};
  const held = { left: false, right: false, up: false, down: false, fire: false };
  addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if ([' ','arrowleft','arrowright','arrowup','arrowdown'].includes(e.key.toLowerCase())) e.preventDefault();
  });
  addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function holdBtn(id, key) {
    const el = document.getElementById(id);
    const dn = e => { e.preventDefault(); held[key] = true; el.classList.add('held'); };
    const up = e => { e.preventDefault(); held[key] = false; el.classList.remove('held'); };
    el.addEventListener('mousedown', dn); el.addEventListener('mouseup', up); el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', dn, { passive: false });
    el.addEventListener('touchend', up, { passive: false }); el.addEventListener('touchcancel', up, { passive: false });
  }
  holdBtn('btn-left', 'left'); holdBtn('btn-right', 'right');
  holdBtn('btn-up', 'up'); holdBtn('btn-down', 'down');
  holdBtn('btn-fire', 'fire');

  let player, bullets, enemies, bosses, glitter;
  let score, lives, wave;
  let lastShot, lastSpawn, lastBoss, lastWave, lastTrail, startTime, running;
  let auditSurvived;
  let toastText = '', toastUntil = 0;
  function showToast(msg) { toastText = msg; toastUntil = performance.now() + 1800; }

  function reset() {
    player = { x: W/2 - 18, y: H - 70, w: 36, h: 38 };
    bullets = []; enemies = []; bosses = []; glitter = [];
    score = 0; lives = 3; wave = 1;
    const now = performance.now();
    lastShot = 0; lastSpawn = 0;
    lastBoss = now; lastWave = now; lastTrail = 0; startTime = now;
    auditSurvived = false; toastText = ''; toastUntil = 0;
    running = true;
    overlay.style.display = 'none';
    updateHud();
  }
  function updateHud() {
    scoreEl.textContent = 'Score: ' + score;
    livesEl.textContent = 'Lives: ' + lives;
    waveEl.textContent = 'Wave: ' + wave;
  }
  function speedMult() { return 1 + (wave - 1) * 0.22; }
  function spawnMs()   { return Math.max(260, ENEMY_SPAWN_MS_BASE - (wave - 1) * 70); }

  function spawnEnemy() {
    const w = 26 + Math.random()*14;
    enemies.push({ x: Math.random()*(W - w), y: -30, w, h: w*0.85, vy: (ENEMY_SPEED_MIN + Math.random()*(ENEMY_SPEED_MAX - ENEMY_SPEED_MIN)) * speedMult() });
  }
  function spawnBoss() {
    bosses.push({ x: W/2 - 55, y: -90, w: 110, h: 88, vx: 2.5 * speedMult(), vy: 0.7, hp: 14 + wave * 2, maxHp: 14 + wave * 2 });
  }
  function spawnGlitter() {
    for (let i = 0; i < 2; i++) {
      glitter.push({ x: player.x + player.w/2 + (Math.random()-0.5)*18, y: player.y + player.h - 4 + Math.random()*6, vx: (Math.random()-0.5)*1.6, vy: 1 + Math.random()*2.2, life: 1, size: 2 + Math.random()*2.5, color: Math.random() < 0.55 ? SECONDARY : '#ffffff' });
    }
  }
  function rectsHit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function endGame() {
    postHi(score);
    running = false;
    overTitle.textContent = 'audited';
    overMsg.textContent = 'The ' + ENEMY_NAME + ' got the slice. Should have filed earlier.';
    overlay.style.display = 'flex';
  }

  function step(now) {
    let vx = 0, vy = 0;
    if (keys['arrowleft']  || keys['a'] || held.left)  vx -= PLAYER_SPEED;
    if (keys['arrowright'] || keys['d'] || held.right) vx += PLAYER_SPEED;
    if (keys['arrowup']    || keys['w'] || held.up)    vy -= PLAYER_SPEED;
    if (keys['arrowdown']  || keys['s'] || held.down)  vy += PLAYER_SPEED;
    player.x = Math.max(0, Math.min(W - player.w, player.x + vx));
    player.y = Math.max(0, Math.min(H - player.h, player.y + vy));

    if ((keys[' '] || held.fire) && now - lastShot > BULLET_COOLDOWN_MS) {
      bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 12, vx: (Math.random() - 0.5) * 3.2, vy: -BULLET_SPEED, bounces: BULLET_BOUNCES });
      lastShot = now;
    }
    if (now - lastTrail > TRAIL_SPAWN_MS) { spawnGlitter(); lastTrail = now; }
    if (now - lastWave > WAVE_INTERVAL_MS) { wave++; lastWave = now; }
    if (now - lastSpawn > spawnMs()) { spawnEnemy(); lastSpawn = now; }
    if (now - lastBoss > BOSS_INTERVAL_MS) { spawnBoss(); lastBoss = now; }

    for (const b of bullets) {
      b.x += b.vx; b.y += b.vy;
      if (b.x < 0)          { b.x = 0;       b.vx *= -1; b.bounces--; }
      else if (b.x + b.w > W) { b.x = W - b.w; b.vx *= -1; b.bounces--; }
      if (b.y < 0)          { b.y = 0;       b.vy *= -1; b.bounces--; }
    }
    bullets = bullets.filter(b => b.y < H + 20 && b.bounces >= 0 && !b.dead);

    for (const e of enemies) e.y += e.vy;
    for (const boss of bosses) {
      boss.x += boss.vx; boss.y += boss.vy;
      if (boss.x < 0)          { boss.x = 0;          boss.vx *= -1; }
      if (boss.x + boss.w > W) { boss.x = W - boss.w; boss.vx *= -1; }
      if (boss.y > 90) boss.vy = 0;
    }
    for (const g of glitter) { g.x += g.vx; g.y += g.vy; g.life -= 0.025; }
    glitter = glitter.filter(g => g.life > 0);

    for (const e of enemies) {
      for (const b of bullets) { if (!b.dead && rectsHit(b, e)) { e.dead = true; b.dead = true; score += 10; } }
      if (!e.dead && rectsHit(e, player)) { e.dead = true; lives--; }
    }
    for (const boss of bosses) {
      for (const b of bullets) {
        if (!b.dead && rectsHit(b, boss)) {
          boss.hp--; b.dead = true;
          if (boss.hp <= 0) { boss.dead = true; score += 150; }
        }
      }
      if (!boss.dead && rectsHit(boss, player)) { lives--; boss.y = -120; boss.vy = 0.7; }
    }
    bullets = bullets.filter(b => !b.dead);
    enemies = enemies.filter(e => !e.dead && e.y < H + 40);
    bosses  = bosses.filter(b => !b.dead);

    updateHud();
    // One-time cosmetic milestone at WIN_SCORE — does NOT stop play or scoring.
    // (No hard ceiling: a fixed end-score every competent player reaches is bad
    // for leaderboard fairness, so the game is endless and ends only on death.)
    if (!auditSurvived && score >= WIN_SCORE) { auditSurvived = true; showToast('Audit survived!'); }
    if (lives <= 0) endGame();
  }

  function drawStars() {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let i = 0; i < 70; i++) {
      const sx = (i*73 + (performance.now()/40)) % W;
      const sy = (i*131) % H;
      ctx.fillRect(sx, sy, 2, 2);
    }
  }
  function drawPizza(x, y, w, h) {
    ctx.save(); ctx.shadowColor = SECONDARY; ctx.shadowBlur = 12;
    ctx.fillStyle = PRIMARY; ctx.beginPath(); ctx.moveTo(x + w/2, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#cfe2ff'; ctx.beginPath(); ctx.moveTo(x + w/2, y + 7); ctx.lineTo(x + w - 5, y + h - 5); ctx.lineTo(x + 5, y + h - 5); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1d4ed8'; ctx.fillRect(x + 2, y + h - 5, w - 4, 4);
    ctx.fillStyle = SECONDARY;
    ctx.beginPath(); ctx.arc(x + w/2, y + h*0.45, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w/2 - 6, y + h*0.72, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w/2 + 6, y + h*0.72, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawAuditor(x, y, w, h) {
    ctx.fillStyle = SECONDARY; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = PRIMARY; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x + w/2, y, w*0.22, Math.PI, 0); ctx.stroke();
    ctx.fillStyle = '#000'; ctx.font = 'bold ' + Math.floor(h*0.65) + 'px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('$', x + w/2, y + h/2 + 1);
  }
  function drawBoss(boss) {
    ctx.save(); ctx.shadowColor = SECONDARY; ctx.shadowBlur = 20;
    ctx.fillStyle = SECONDARY; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); ctx.shadowBlur = 0;
    ctx.strokeStyle = PRIMARY; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(boss.x + boss.w/2, boss.y, boss.w*0.18, Math.PI, 0); ctx.stroke();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(boss.x + boss.w*0.32, boss.y + boss.h*0.42, 11, 0, Math.PI*2);
    ctx.arc(boss.x + boss.w*0.68, boss.y + boss.h*0.42, 11, 0, Math.PI*2);
    ctx.moveTo(boss.x + boss.w*0.32 + 11, boss.y + boss.h*0.42);
    ctx.lineTo(boss.x + boss.w*0.68 - 11, boss.y + boss.h*0.42);
    ctx.stroke();
    ctx.fillStyle = '#000'; ctx.fillRect(boss.x + boss.w*0.32, boss.y + boss.h*0.7, boss.w*0.36, 7);
    ctx.fillStyle = '#220011'; ctx.fillRect(boss.x, boss.y - 14, boss.w, 7);
    ctx.fillStyle = PRIMARY; ctx.fillRect(boss.x, boss.y - 14, boss.w * (boss.hp / boss.maxHp), 7);
    ctx.fillStyle = PRIMARY; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText('AUDIT BOSS', boss.x + boss.w/2, boss.y - 20);
    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    drawStars();
    for (const g of glitter) { ctx.globalAlpha = Math.max(0, g.life); ctx.fillStyle = g.color; ctx.fillRect(g.x, g.y, g.size, g.size); }
    ctx.globalAlpha = 1;
    drawPizza(player.x, player.y, player.w, player.h);
    ctx.save(); ctx.shadowColor = SECONDARY; ctx.shadowBlur = 10; ctx.fillStyle = SECONDARY;
    for (const b of bullets) ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.restore();
    for (const e of enemies) drawAuditor(e.x, e.y, e.w, e.h);
    for (const boss of bosses) drawBoss(boss);
    if (toastText && performance.now() < toastUntil) {
      ctx.save();
      ctx.globalAlpha = 0.9; ctx.fillStyle = SECONDARY;
      ctx.font = 'bold 26px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(toastText, W / 2, H * 0.3);
      ctx.restore();
    }
  }

  function loop(now) {
    if (running) step(now);
    draw();
    requestAnimationFrame(loop);
  }
  document.getElementById('restart').addEventListener('click', () => { grabFocus(); reset(); });
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
