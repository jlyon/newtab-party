<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stump Grandpa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root { --primary: #4A2E1A; --secondary: #8B6F47; --bg: #E8D4B0; --ink: #3A1F0E; --aged: #C9A876; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at top left, rgba(74,46,26,0.12), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(74,46,26,0.18), transparent 55%),
      radial-gradient(ellipse at center, transparent 40%, rgba(58,31,14,0.35) 100%);
    pointer-events: none; z-index: 1;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(rgba(74,46,26,0.08) 1px, transparent 1px), radial-gradient(rgba(58,31,14,0.06) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px; background-position: 0 0, 1px 2px;
    pointer-events: none; z-index: 2; opacity: 0.5; mix-blend-mode: multiply;
  }
  #wrap { position: relative; z-index: 3; max-width: 760px; margin: 0 auto; padding: 28px 16px 60px; text-align: center; }
  h1 { font-family: 'IM Fell English SC', 'Times New Roman', serif; margin: 0 0 2px; font-size: 44px; letter-spacing: 3px; color: var(--primary); text-shadow: 1px 1px 0 rgba(0,0,0,0.15); }
  .sub { font-style: italic; opacity: 0.8; margin-bottom: 16px; font-size: 14px; letter-spacing: 1px; }
  #hud { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px 22px; margin-bottom: 14px; font-size: 14px; letter-spacing: 1px; }
  #hud span { white-space: nowrap; }
  #patienceWrap { max-width: 520px; margin: 0 auto 14px; text-align: left; font-size: 12px; letter-spacing: 2px; }
  #patienceLabel { display: flex; justify-content: space-between; margin-bottom: 4px; }
  #patienceBar { height: 14px; background: rgba(74,46,26,0.18); border: 2px solid var(--primary); position: relative; overflow: hidden; }
  #patienceFill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 100%; transition: width 0.4s ease; }
  #heckle { min-height: 38px; margin: 6px auto 16px; max-width: 540px; font-style: italic; font-size: 15px; color: var(--primary); opacity: 0; transition: opacity 0.25s ease; padding: 4px 10px; border-top: 1px dashed var(--secondary); border-bottom: 1px dashed var(--secondary); }
  #heckle.show { opacity: 1; }
  #heckle::before { content: '◂ Grandpa says: '; font-style: normal; opacity: 0.7; font-size: 12px; letter-spacing: 1px; }
  #board { display: grid; gap: 8px; justify-content: center; margin: 0 auto; }
  .card { aspect-ratio: 3/4; perspective: 800px; cursor: pointer; transform: rotate(var(--tilt, 0deg)); transition: transform 0.2s; }
  .card:hover { transform: rotate(var(--tilt, 0deg)) translateY(-2px); }
  .inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.4s; }
  .card.flipped .inner, .card.matched .inner { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; backface-visibility: hidden; border-radius: 4px; user-select: none; border: 2px solid var(--ink); }
  .front { background: repeating-linear-gradient(45deg, var(--primary) 0 6px, #3a2414 6px 12px); color: var(--bg); font-family: 'IM Fell English SC', serif; font-weight: 700; font-size: 22px; box-shadow: 2px 3px 0 rgba(0,0,0,0.35), inset 0 0 12px rgba(0,0,0,0.4); letter-spacing: 2px; }
  .front::after { content: 'S·G'; color: var(--aged); text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }
  .back { transform: rotateY(180deg); background: radial-gradient(ellipse at center, #f0dcb4 0%, #d4b48a 60%, #b8965f 100%); color: var(--ink); font-size: clamp(20px, 5vw, 38px); box-shadow: 2px 3px 0 rgba(0,0,0,0.35); filter: sepia(0.4) contrast(0.95) brightness(0.95); }
  .card.matched .inner { animation: matchPulse 0.6s ease; }
  .card.matched .back { opacity: 0.55; filter: sepia(0.85) contrast(0.85) brightness(0.85); }
  .card.wrong .inner { animation: shake 0.4s ease; }
  @keyframes matchPulse { 0%, 100% { transform: rotateY(180deg) scale(1); } 50% { transform: rotateY(180deg) scale(1.08); } }
  @keyframes shake { 0%, 100% { transform: rotateY(180deg) translateX(0); } 25% { transform: rotateY(180deg) translateX(-4px); } 75% { transform: rotateY(180deg) translateX(4px); } }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(58,31,14,0.92); flex-direction: column; text-align: center; padding: 20px; z-index: 10; color: var(--bg); }
  #overlay.show { display: flex; }
  #overlay h2 { font-family: 'IM Fell English SC', serif; color: var(--aged); font-size: 44px; margin: 0 0 10px; letter-spacing: 4px; }
  #overlay p { max-width: 480px; font-size: 16px; }
  #overlay button { margin-top: 22px; padding: 12px 26px; font-size: 15px; font-family: 'Special Elite', monospace; background: var(--aged); color: var(--ink); border: 2px solid var(--bg); cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }
  #overlay button:hover { background: var(--bg); }
  .badge { display: inline-block; padding: 2px 8px; border: 1px solid currentColor; font-size: 12px; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>Stump Grandpa</h1>
  <div class="sub">~ a memory contest against an elderly menace ~</div>
  <div id="hud">
    <span>Moves: <strong id="moves">0</strong></span>
    <span>Matches: <strong id="matches">0 / 18</strong></span>
    <span>Time: <strong id="time">0s</strong></span>
    <span>Misses: <strong id="misses">0</strong></span>
  </div>
  <div id="patienceWrap">
    <div id="patienceLabel"><span>Grandpa&rsquo;s Patience</span><span id="patienceNum">100%</span></div>
    <div id="patienceBar"><div id="patienceFill"></div></div>
  </div>
  <div id="heckle">&nbsp;</div>
  <div id="board"></div>
</div>
<div id="overlay">
  <h2 id="overTitle">You did it!</h2>
  <p id="overMsg">All matched. Iconic.</p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  // High score reporting.
  // Skill metric (RAW) = matches earned, leftover patience, and clean play (few
  // wasted moves / misses). Raw spread runs ~0..1800; SCORE_SCALE (0.56)
  // normalizes so a near-perfect game (all 18 pairs, ~minimal moves, no misses,
  // high patience) lands ≈ 1000, and a sloppy win sits in the low hundreds.
  // No fixed ceiling everyone ties at. Integer; only a new best is posted.
  const SCORE_SCALE = 0.56;  // tuned so a great run ≈ 1000
  let _hi = 0;
  function postHi(raw) {
    const n = Math.round((Number(raw) || 0) * SCORE_SCALE);
    if (n > _hi) { _hi = n; try { window.parent.postMessage({ highScore: n }, '*'); } catch (e) {} }
  }

  const board = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const matchesEl = document.getElementById('matches');
  const timeEl = document.getElementById('time');
  const missesEl = document.getElementById('misses');
  const patienceFill = document.getElementById('patienceFill');
  const patienceNum = document.getElementById('patienceNum');
  const heckleEl = document.getElementById('heckle');
  const overlay = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg = document.getElementById('overMsg');

  const GRID = 6;
  const SYMBOLS = [
    '\u{1F3A9}', '\u{1F978}', '⌛', '\u{1F570}️', '\u{1F682}', '\u{1F4EF}',
    '\u{1FA95}', '\u{1F3BB}', '\u{1F6B2}', '☂', '\u{1F377}', '✉️',
    '\u{1FA92}', '\u{1F399}️', '\u{1FA99}', '\u{1F56F}️', '⚓', '\u{1F4DC}'
  ];
  const HECKLES_WRONG = [
    "Bah! In my day, we HAD memory.", "Pfft. My pocket watch has better recall.",
    "You call that thinking, sonny?", "Back in '07 I'd have matched that with my eyes shut.",
    "*sips prune juice* Disappointing.", "I've forgotten more matches than you'll ever make.",
    "Hand me my cane, this is painful to watch.", "I was matching cards before color TV, kid.",
    "My dentures know better than you.", "Maybe try using your good eye?",
    "I told your father about this. He laughed.", "Hrumph.",
    "Adjust your monocle, you missed.", "Was that supposed to match? *adjusts hearing aid*",
    "I knew you'd flub that one. Grandma agrees.", "You're embarrassing the family name.",
    "I've seen more match in a sock drawer.", "That's not how we did it on the farm.",
    "Walk it off, soft hands.", "I have socks older than your attention span."
  ];
  const HECKLES_RIGHT = [
    "Hmph. Lucky.", "Beginner's luck.", "Even a broken clock is right twice a day.",
    "*reluctantly nods*", "Don't get cocky now.", "One match doesn't make a man.",
    "I'd applaud but my hands hurt.", "Fine. Fine. Carry on.", "I let you have that one."
  ];
  const GRANDPA_WINS = [
    "I'm going back to bed. I win. Tell your mother.",
    "STUMPED YOU. I'm calling everyone in the church directory.",
    "And THAT'S why I don't visit more often."
  ];
  const YOU_WIN = [
    "Fine. You stumped me. Don't tell your cousins.",
    "Hrmph. Grandma did it faster. But — alright. Alright.",
    "I'll have your name engraved on the good silver."
  ];

  const PAIRS = (GRID * GRID) / 2;
  matchesEl.textContent = '0 / ' + PAIRS;

  let cards, flipped, moves, matches, misses, patience, lock, startTime, timer, ended;

  function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

  let heckleTimeout;
  function heckle(msg) {
    heckleEl.textContent = msg;
    heckleEl.classList.add('show');
    clearTimeout(heckleTimeout);
    heckleTimeout = setTimeout(() => heckleEl.classList.remove('show'), 2400);
  }

  function setPatience(p) {
    patience = Math.max(0, Math.min(100, p));
    patienceFill.style.width = patience + '%';
    patienceNum.textContent = Math.round(patience) + '%';
    patienceFill.style.background = patience <= 30
      ? 'linear-gradient(90deg, #6b1a0a, #a85a2a)'
      : 'linear-gradient(90deg, var(--primary), var(--secondary))';
    if (patience <= 0 && !ended) grandpaWins();
  }

  function reset() {
    overlay.classList.remove('show');
    ended = false;
    moves = 0; matches = 0; misses = 0;
    flipped = []; lock = false;
    setPatience(100);
    if (timer) clearInterval(timer);
    startTime = Date.now();
    timer = setInterval(() => {
      const s = Math.floor((Date.now()-startTime)/1000);
      timeEl.textContent = s + 's';
      if (!ended) setPatience(patience - 0.03);
    }, 250);

    const picks = SYMBOLS.slice(0, PAIRS);
    const deck = [...picks, ...picks];
    for (let i = deck.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }

    board.style.gridTemplateColumns = 'repeat(' + GRID + ', minmax(0, 1fr))';
    const maxBoard = Math.min(window.innerWidth - 32, 600);
    board.style.maxWidth = maxBoard + 'px';
    board.innerHTML = '';
    cards = deck.map((sym, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.index = i;
      el.dataset.symbol = sym;
      const tilt = (Math.random() * 4 - 2).toFixed(2);
      el.style.setProperty('--tilt', tilt + 'deg');
      el.innerHTML = '<div class="inner"><div class="face front"></div><div class="face back">' + sym + '</div></div>';
      el.addEventListener('click', () => flip(el));
      board.appendChild(el);
      return el;
    });
    updateHud();
    heckle("Alright, whippersnapper. Let's see what you've got.");
  }

  function updateHud() {
    movesEl.textContent = moves;
    matchesEl.textContent = matches + ' / ' + PAIRS;
    missesEl.textContent = misses;
  }

  function flip(el) {
    if (lock || ended) return;
    if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
    el.classList.add('flipped');
    flipped.push(el);
    if (flipped.length === 2) {
      moves++; updateHud();
      const [a, b] = flipped;
      if (a.dataset.symbol === b.dataset.symbol) {
        a.classList.add('matched'); b.classList.add('matched');
        flipped = [];
        matches++; updateHud();
        setPatience(patience + 1.5);
        heckle(pick(HECKLES_RIGHT));
        if (matches === PAIRS) win();
      } else {
        misses++; updateHud();
        lock = true;
        a.classList.add('wrong'); b.classList.add('wrong');
        setPatience(patience - 4);
        heckle(pick(HECKLES_WRONG));
        if (Math.random() < 0.05) {
          setTimeout(() => {
            const candidates = cards.filter(c => !c.classList.contains('matched') && !c.classList.contains('flipped'));
            if (candidates.length >= 2) {
              const i1 = Math.floor(Math.random()*candidates.length);
              let i2 = Math.floor(Math.random()*candidates.length);
              while (i2 === i1) i2 = Math.floor(Math.random()*candidates.length);
              const c1 = candidates[i1], c2 = candidates[i2];
              const s1 = c1.dataset.symbol;
              c1.dataset.symbol = c2.dataset.symbol; c2.dataset.symbol = s1;
              c1.querySelector('.back').textContent = c1.dataset.symbol;
              c2.querySelector('.back').textContent = c2.dataset.symbol;
              heckle("Wait — did I shuffle those? My memory ain't what it was.");
            }
          }, 400);
        }
        setTimeout(() => {
          a.classList.remove('flipped','wrong'); b.classList.remove('flipped','wrong');
          flipped = []; lock = false;
        }, 950);
      }
    }
  }

  function win() {
    ended = true;
    clearInterval(timer);
    const s = Math.floor((Date.now()-startTime)/1000);
    // Pass the RAW skill metric; postHi applies SCORE_SCALE. On-screen badges below unchanged.
    const raw = Math.max(0, matches * 100 + Math.round(patience) - moves * 3 - misses * 10);
    postHi(raw);
    overTitle.textContent = 'STUMPED!';
    overMsg.innerHTML = pick(YOU_WIN) + '<br><br>' +
      '<span class="badge">' + moves + ' moves</span> ' +
      '<span class="badge">' + s + 's</span> ' +
      '<span class="badge">' + misses + ' misses</span> ' +
      '<span class="badge">Patience left: ' + Math.round(patience) + '%</span>';
    overlay.classList.add('show');
  }

  function grandpaWins() {
    ended = true;
    clearInterval(timer);
    overTitle.textContent = 'GRANDPA WINS';
    overMsg.innerHTML = pick(GRANDPA_WINS) + '<br><br>' +
      '<span class="badge">' + matches + ' / ' + PAIRS + ' matched</span> ' +
      '<span class="badge">' + misses + ' misses</span>';
    overlay.classList.add('show');
  }

  document.getElementById('restart').addEventListener('click', reset);
  window.addEventListener('resize', () => {
    const maxBoard = Math.min(window.innerWidth - 32, 600);
    board.style.maxWidth = maxBoard + 'px';
  });
  reset();
})();
</script>
</body>
</html>
