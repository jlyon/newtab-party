<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Tippity Toes</title>
<style>
  :root { --primary: #FF7AAE; --secondary: #8FE0BB; --bg: #FFF1B0; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: #B23A6F;
    font-family: system-ui, sans-serif; touch-action: manipulation; }
  #wrap { display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 16px 8px; gap: 10px; }
  h1 { margin: 0; font-size: clamp(18px, 5vw, 28px); letter-spacing: 2px; color: #B23A6F; }
  #hud { display: flex; gap: 18px; font-size: clamp(11px, 3vw, 14px); opacity: 0.9; flex-wrap: wrap; justify-content: center; }
  #grid { display: grid; gap: 3px; }
  .cell {
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; cursor: pointer; border-radius: 6px; user-select: none;
    border: 2px solid var(--primary);
  }
  .cell.hidden { background: var(--primary); color: var(--bg); font-size: 0; }
  .cell.flagged { background: var(--secondary); color: var(--bg); border-color: var(--secondary); }
  .cell.revealed { border-color: rgba(178,58,111,0.18); cursor: default; background: #FFFBE0; }
  .cell.mine-hit { background: #FF5C8A !important; border-color: #E63973; }
  .cell.mine-shown { background: #FFE4EF; }
  .n1{color:#4488ff} .n2{color:#2BAE66} .n3{color:#E63973} .n4{color:#9966cc}
  .n5{color:#FF8800} .n6{color:#00B3B3} .n7{color:#B23A6F} .n8{color:#666}
  #hint { font-size: clamp(10px, 2.5vw, 12px); opacity: 0.6; text-align: center; color: #B23A6F; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(255, 241, 176, 0.94); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: #B23A6F; font-size: clamp(26px, 7vw, 42px); margin: 0 0 8px; }
  #overlay p { color: #B23A6F; margin: 4px 0; font-size: clamp(12px, 3vw, 16px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 999px; letter-spacing: 1px; font-weight: 700; }
  #overlay button:hover { background: #FF5C9A; }
</style>
</head>
<body>
<div id="wrap">
  <h1>🐰 Tippity Toes 🐣</h1>
  <div id="hud">
    <span>Tippy-toer: Bun-Bun</span>
    <span id="mines-left">🥚 0</span>
    <span id="timer">⏱ 0s</span>
    <span id="hi">Best: —</span>
  </div>
  <div id="grid"></div>
  <div id="hint">Tap to tiptoe · Long-press (or right-click) to mark a 🐰</div>
</div>
<div id="overlay">
  <h2 id="overTitle">Cracked.</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Hop again</button>
</div>
<script>
(() => {
  const minesEl  = document.getElementById('mines-left');
  const timerEl  = document.getElementById('timer');
  const hiEl     = document.getElementById('hi');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');
  const gridEl = document.getElementById('grid');

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME = 'Bun-Bun';
  // Intermediate difficulty
  const COLS  = 16;
  const ROWS  = 16;
  const MINES = 40;
  const EGG       = '🥚';
  const CRACKED   = '🍳';
  const FLAG_EMOJI = '🐰';
  const WIN_MSG  = PLAYER_NAME + ' tiptoed through the whole basket. Not one egg cracked.';
  const LOSE_MSG = 'You stepped on an egg. It cracked. The Easter Bunny saw.';
  // ==================================

  let board, flagged, revealed, done, firstClick;
  let timerStart, timerVal, timerTick, hiTime = null;

  function reset() {
    board    = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    flagged  = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    done = false; firstClick = true;
    clearInterval(timerTick); timerVal = 0;
    timerEl.textContent = '⏱ 0s';
    minesEl.textContent = EGG + ' ' + MINES;
    overlay.style.display = 'none';
    render();
  }

  function placeMines(safeR, safeC) {
    let n = 0;
    while (n < MINES) {
      const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
      if (board[r][c] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      board[r][c] = -1; n++;
    }
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c] !== -1)
          board[r][c] = adj(r, c).filter(([nr, nc]) => board[nr][nc] === -1).length;
  }

  function adj(r, c) {
    const out = [];
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r+dr, nc = c+dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) out.push([nr, nc]);
      }
    return out;
  }

  function flood(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;
    if (board[r][c] === 0) adj(r, c).forEach(([nr, nc]) => flood(nr, nc));
  }

  function postHi(s) { window.parent.postMessage({ highScore: s }, '*'); }

  function endGame(won, hitR, hitC) {
    if (done) return;
    done = true;
    clearInterval(timerTick);
    // expose all eggs
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c] === -1 && !flagged[r][c]) revealed[r][c] = true;
    render(hitR, hitC);
    if (won) {
      const score = Math.max(1, Math.round(10000 / (timerVal + 1)));
      if (hiTime === null || timerVal < hiTime) { hiTime = timerVal; postHi(score); }
      hiEl.textContent = 'Best: ' + timerVal + 's';
    }
    overTitle.textContent = won ? '🐣 Hatched!' : '🍳 Cracked!';
    overMsg.textContent = won ? WIN_MSG + ' (' + timerVal + 's)' : LOSE_MSG;
    overScore.textContent = won && hiTime === timerVal ? '✨ New record! ✨' : '';
    overlay.style.display = 'flex';
  }

  function onReveal(r, c) {
    if (done || revealed[r][c] || flagged[r][c]) return;
    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      timerStart = Date.now(); timerVal = 0;
      timerTick = setInterval(() => {
        timerVal = Math.floor((Date.now() - timerStart) / 1000);
        timerEl.textContent = '⏱ ' + timerVal + 's';
      }, 250);
    }
    if (board[r][c] === -1) { revealed[r][c] = true; endGame(false, r, c); return; }
    flood(r, c);
    render();
    const safe = ROWS * COLS - MINES;
    if (revealed.flat().filter(Boolean).length >= safe) endGame(true);
  }

  function onFlag(r, c) {
    if (done || revealed[r][c]) return;
    flagged[r][c] = !flagged[r][c];
    minesEl.textContent = EGG + ' ' + (MINES - flagged.flat().filter(Boolean).length);
    render();
  }

  let pressTimer = null;

  function cellSize() { return Math.min(36, Math.floor((Math.min(window.innerWidth - 20, 640)) / COLS) - 3); }

  function render(hitR, hitC) {
    const sz = cellSize();
    gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${sz}px)`;
    gridEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement('div');
        el.className = 'cell';
        el.style.width = el.style.height = sz + 'px';
        el.style.fontSize = Math.round(sz * 0.6) + 'px';
        const isHit = r === hitR && c === hitC;
        if (revealed[r][c]) {
          const isMine = board[r][c] === -1;
          el.classList.add('revealed');
          if (isHit) el.classList.add('mine-hit');
          else if (isMine) el.classList.add('mine-shown');
          if (isMine) el.textContent = isHit ? CRACKED : EGG;
          else if (board[r][c] > 0) { el.textContent = board[r][c]; el.classList.add('n' + board[r][c]); }
        } else if (flagged[r][c]) {
          el.classList.add('flagged'); el.textContent = FLAG_EMOJI;
        } else {
          el.classList.add('hidden');
        }
        el.addEventListener('click', e => { e.preventDefault(); onReveal(r, c); });
        el.addEventListener('contextmenu', e => { e.preventDefault(); onFlag(r, c); });
        el.addEventListener('touchstart', () => {
          pressTimer = setTimeout(() => { onFlag(r, c); pressTimer = null; }, 480);
        }, { passive: true });
        el.addEventListener('touchend', e => {
          if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        });
        el.addEventListener('touchmove', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
        gridEl.appendChild(el);
      }
    }
  }

  addEventListener('keydown', e => {
    if (e.key === 'Enter' && overlay.style.display !== 'none') document.getElementById('restart').click();
  });
  addEventListener('resize', () => { if (!done || overlay.style.display === 'none') render(); });
  document.getElementById('restart').addEventListener('click', reset);
  reset();
})();
</script>
</body>
</html>
