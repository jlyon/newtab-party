<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>the wildcard</title>
<style>
  :root { --primary: #d896ff; --secondary: #ff6ec7; --bg: #150421; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg); color: var(--primary);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.55; overflow-x: hidden;
  }
  #sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .sparkle {
    position: absolute; width: 6px; height: 6px;
    background: var(--secondary);
    clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
    opacity: 0; animation: twinkle 4s infinite ease-in-out;
  }
  @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(180deg); } }
  #wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 60px 24px 80px; }
  h1 { color: var(--secondary); font-size: 56px; letter-spacing: 2px; margin: 0 0 6px; text-transform: lowercase; font-style: italic; }
  .sub { opacity: 0.75; font-size: 14px; margin-bottom: 40px; font-style: italic; }
  #scene { font-size: 18px; border-left: 3px solid var(--secondary); padding: 0 0 0 20px; margin-bottom: 28px; min-height: 120px; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: block; width: 100%; text-align: left; font: inherit; font-size: 16px;
    background: transparent; color: var(--primary); border: 1px solid var(--primary);
    padding: 12px 16px; cursor: pointer; transition: background 0.12s, color 0.12s, transform 0.08s;
  }
  .choice:hover { background: var(--primary); color: var(--bg); transform: translateX(4px); }
  .ending .choice { border-color: var(--secondary); color: var(--secondary); }
  .ending .choice:hover { background: var(--secondary); color: var(--bg); }
  .meta { margin-top: 28px; font-size: 13px; opacity: 0.65; font-style: italic; }
</style>
</head>
<body>
<div id="sparkles"></div>
<div id="wrap">
  <h1>the wildcard</h1>
  <div class="sub">A bachelorette party CYOA. You're the wild card. Try not to ruin everything. (You will.)</div>
  <div id="scene"></div>
  <div id="choices" class="choices"></div>
  <div class="meta" id="meta"></div>
</div>
<script>
(() => {
  // High score reporting.
  // We post a CONTINUOUS skill metric on ANY ending (not only wins) so most
  // plays register and results spread out. The raw metric rewards EXPLORATION
  // (distinct story nodes ever seen this session — replaying to find new
  // branches climbs the score) plus a big bonus for actually reaching a WIN
  // ending, minus a small penalty per restart after a non-win ending (rewards
  // getting there cleanly). SCORE_SCALE then normalizes onto the shared ~1000
  // scale: a thorough WIN run that has seen most of the ~22 nodes lands ≈ 1000;
  // a quick lose registers a modest spread of points instead of zero.
  const WIN_BONUS       = 9;   // raw points for landing any win ending
  const NODE_POINTS     = 1;   // raw per distinct node discovered this session
  const RESTART_PENALTY = 1;   // raw per restart taken after a non-win ending
  // ~22 nodes total; a thorough win ≈ 22*1 + 9 = 31 raw → 31*32 ≈ 992 ≈ 1000.
  const SCORE_SCALE = 32;
  let _hi = 0;
  function postHi(raw) {
    const n = Math.round((Number(raw) || 0) * SCORE_SCALE);
    if (n > _hi) { _hi = n; try { window.parent.postMessage({ highScore: n }, '*'); } catch (e) {} }
  }

  const sparkleLayer = document.getElementById('sparkles');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.animationDuration = (3 + Math.random() * 4) + 's';
    s.style.width = s.style.height = (4 + Math.random() * 8) + 'px';
    sparkleLayer.appendChild(s);
  }

  const sceneEl = document.getElementById('scene');
  const choicesEl = document.getElementById('choices');
  const metaEl = document.getElementById('meta');

  const story = {
    start: {
      text: `Vegas. Bachelorette weekend. You arrive at the gate and spot the bride — Tiffany — already crying into a Cinnabon. The wedding is in three weeks. The maid of honor, Brittany, has a clipboard. An actual physical clipboard. What's your move?`,
      choices: [
        { label: "Tell Tiffany to suck it up and get on the plane.", next: "plane_rude" },
        { label: "Slide her the emergency flask from your purse.", next: "flask" },
        { label: "Take a selfie with her tears in the background.", next: "selfie" }
      ]
    },
    plane_rude: {
      text: `On the plane you're wedged between Tiffany and her mom, who is already three travel-bottles of rosé in. Tiffany sniffles wetly into your shoulder. There is a snack pack on her tray.`,
      choices: [
        { label: "Recline your seat fully into the lap of the person behind you.", next: "plane_recline" },
        { label: "Eat Tiffany's entire snack pack while maintaining eye contact.", next: "plane_snack" }
      ]
    },
    plane_recline: {
      text: `You hear a sharp intake of breath behind you. You turn around. The person whose knees you're now crushing is an off-duty flight attendant. It is also your ex, Morgan. Morgan looks at you the way you imagine god looks at a moth.`,
      choices: [
        { label: "Squint and pretend you don't recognize them.", next: "vegas_arrive" },
        { label: "Smile sweetly and say 'Wow, your posture is still terrible.'", next: "ex_burn" }
      ]
    },
    ex_burn: {
      text: `Morgan stands up, very calmly walks to the galley, and returns with a full glass of tomato juice. They trip. Plausibly. You arrive in Las Vegas looking like the third act of a slasher film. Tiffany is, for the first time today, NOT the most distressed person at baggage claim. She seems… relieved.`,
      choices: [
        { label: "Lean in. You are the chaos demon now. Embrace it.", next: "vegas_arrive" },
        { label: "Loudly demand Morgan pay for dry cleaning at the carousel.", next: "lose_kicked_early" }
      ]
    },
    plane_snack: {
      text: `You eat every pretzel, every Biscoff, every olive. Tiffany's lower lip wobbles in a way that triggers something ancient in the cabin crew. You are escorted off the plane in Phoenix for "creating an emotional disturbance." Your luggage continues to Vegas without you.`,
      ending: "lose"
    },
    flask: {
      text: `Tiffany takes the flask. Tiffany drinks the entire flask in ninety seconds. Tiffany passes out on the gate carpet before boarding even starts. Brittany is in the bathroom. No one else has noticed.`,
      choices: [
        { label: "Take Tiffany's first-class boarding pass and check in as her.", next: "first_class" },
        { label: "Slap her gently awake and confess.", next: "vegas_arrive" }
      ]
    },
    first_class: {
      text: `Free champagne. You drink seven glasses. Somewhere over Utah you forget you came with a group. You forget you HAVE a group. You land in Vegas convinced you are here for a solo spiritual retreat.`,
      choices: [
        { label: "Wander off down the strip alone, drawn by the lights.", next: "casino" },
        { label: "Wait at baggage claim like a normal adult woman.", next: "vegas_arrive" }
      ]
    },
    selfie: {
      text: `You post it to your story with the caption "when you peak too early 😬". Tiffany sees it. Tiffany does not laugh. By the time you board, the bridal party WhatsApp has 147 unread messages and three of them are just the knife emoji.`,
      choices: [
        { label: "Double down. Reply in the group chat: 'what? it's true.'", next: "vegas_arrive" },
        { label: "Delete the post. Fake remorse. Cry-emoji your way out.", next: "vegas_arrive" }
      ]
    },
    vegas_arrive: {
      text: `The hotel suite is bigger than your apartment. There are sashes. There are tiny pink hats. There is a SCHEDULE printed on cardstock and laminated. Brittany hands you yours. You look at it. It says 7:30am — Sunrise Yoga.`,
      choices: [
        { label: "Rip the schedule in half. In front of Brittany. Slowly.", next: "schedule_rip" },
        { label: "Pitch the strip club instead. With unsettling enthusiasm.", next: "strip_club" },
        { label: "Drink the entire welcome bottle of champagne yourself.", next: "champagne_solo" }
      ]
    },
    schedule_rip: {
      text: `Brittany has been planning this weekend for fourteen months. She has a Pinterest board with 600 pins. She makes a sound like a kettle giving up. Tiffany starts crying again. You realize, briefly, that you may have miscalculated. The realization passes.`,
      choices: [
        { label: "Apologize loudly and theatrically, then hijack the planning.", next: "takeover" },
        { label: "Grab your purse and walk out. The strip is calling.", next: "casino" }
      ]
    },
    strip_club: {
      text: `Against every available odd, this works. The girls love it. Tiffany discovers she can do the splits. Brittany cries — happy tears this time. The groom calls to check in and Brittany answers, slurred and glittered, and yells "SHE IS THRIVING." You are, briefly, the hero of this story.`,
      choices: [
        { label: "Quit while you're ahead. Go to bed. Be a legend.", next: "win_hero" },
        { label: "Order another round. The night is young. (It is 4am.)", next: "wedding_chapel" }
      ]
    },
    champagne_solo: {
      text: `You drink the bottle in four minutes. You black out somewhere around the speech you were giving to the minibar. You wake up in a hotel suite that is NOT yours, wearing a rhinestone tiara that says "ALMOST MRS." Tiffany does not own this tiara.`,
      choices: [
        { label: "Find the bridal party. They must be somewhere.", next: "find_group" },
        { label: "Keep the tiara. Start a new life. You're someone else now.", next: "neutral_runaway" }
      ]
    },
    takeover: {
      text: `You take the clipboard. You rip up the yoga. You install brunch, three (3) bottomless mimosas per girl, a pool float shaped like a swan named Geoffrey, and a karaoke slot at 11pm. It goes flawlessly. Tiffany sobs with joy. Brittany, defeated and impressed, hands you the laminated schedule and whispers "you're better at this than me." You feel a horrible new feeling. It might be growth.`,
      ending: "win"
    },
    casino: {
      text: `You sit down at a blackjack table at 2am with forty dollars. By 4am you have eleven thousand dollars and a gentleman caller named Reggie. Reggie is 67. Reggie owns "a regional chain of dry cleaners." Reggie thinks you're hilarious.`,
      choices: [
        { label: "Walk away with the cash. Tip the dealer. Live like an adult.", next: "win_solo" },
        { label: "Double down. Risk it all on one hand. You feel lucky.", next: "lose_broke" },
        { label: "Marry Reggie. Right now. There's a chapel in the lobby.", next: "wedding_chapel" }
      ]
    },
    wedding_chapel: {
      text: `You wake up married. Not to anyone you came here with. To Reggie. The certificate is real. Reggie is delightful. Reggie's dry cleaning empire is, somehow, also delightful. Tiffany's wedding is in three weeks. You are now technically her aunt-in-law. No one knows how.`,
      ending: "neutral"
    },
    find_group: {
      text: `You find them in the lobby. They are FURIOUS. You are wearing a stranger's tiara, missing one shoe, and cannot recall the year. Tiffany is shaking. Brittany has a vein going in her forehead. The bride wants you OUT of the suite. Out of the wedding. Out of her life.`,
      choices: [
        { label: "Deliver a wildly unhinged, accidentally beautiful speech.", next: "speech" },
        { label: "Claim total amnesia. You don't even know these women.", next: "lose_kicked" }
      ]
    },
    speech: {
      text: `You don't know where the words come from. You talk about Tiffany at age seven, eating a worm on a dare. You talk about the time she held your hair in a Chipotle bathroom. You talk about love and noise and growing up. By the end, Tiffany is sobbing in your arms. Brittany is suspicious but defeated. You are reinstated. The tiara stays.`,
      ending: "win"
    },
    win_hero: {
      text: `You wake at 9am, hangover already mostly handled by a single Gatorade. Tiffany is still grinning in her sleep. Brittany has left you a Post-It on the mini fridge that just says "thank you." YOU DID THIS. You are, somehow, inexplicably, a good friend. Don't get used to it.`,
      ending: "win"
    },
    win_solo: {
      text: `You walk out with eleven grand, a kiss on the cheek from Reggie, and a story you'll tell at dinner parties for forty years. Tiffany is not currently speaking to you, for unrelated reasons. You do not care. You're rich now. The wildcard wins.`,
      ending: "win"
    },
    lose_broke: {
      text: `You bet it all on a 16. The dealer hits 21. You owe the casino your wallet, your dignity, and a non-trivial percentage of your future earnings. Reggie has quietly disappeared. The bridal party still does not know where you are. Your phone has 84 missed calls.`,
      ending: "lose"
    },
    lose_kicked_early: {
      text: `Morgan, calmly, files a formal complaint. You are detained at McCarran. The bridal party Ubers off without you. Tiffany texts you a single word: "good." You are flying home at 6am. Alone. In a tomato-juice dress.`,
      ending: "lose"
    },
    lose_kicked: {
      text: `You're out. Banned from the wedding. Removed from the group chat. Months later, a single thank-you note arrives in the mail. It is from Brittany. It reads, in full: "good riddance." She has signed it in glitter pen.`,
      ending: "lose"
    },
    neutral_runaway: {
      text: `You walk out of the hotel wearing a stranger's tiara and a fake name. You take a bus to Reno. You start over. Are you happy? Unclear. Are you the wildcard? Always. Some endings are not endings. They are pivots.`,
      ending: "neutral"
    }
  };

  let visited = 0;                 // nodes seen in the current run
  let restarts = 0;                // restarts after a non-win ending this session
  const seenNodes = new Set();     // distinct nodes ever discovered this session
  function go(id) {
    const node = story[id];
    if (!node) { sceneEl.textContent = "(missing scene: " + id + ")"; return; }
    visited++;
    seenNodes.add(id);
    sceneEl.textContent = node.text;
    choicesEl.innerHTML = '';
    choicesEl.classList.toggle('ending', !!node.ending);
    if (node.ending) {
      // Post on ANY ending so most plays register a (continuous) score.
      const raw = NODE_POINTS * seenNodes.size
        + (node.ending === 'win' ? WIN_BONUS : 0)
        - RESTART_PENALTY * restarts;
      postHi(Math.max(0, raw));
      const lostRun = node.ending !== 'win';
      const b = document.createElement('button');
      b.className = 'choice';
      b.textContent = '↺ Start over (you didn\'t learn anything)';
      b.onclick = () => { if (lostRun) restarts++; visited = 0; go('start'); };
      choicesEl.appendChild(b);
      metaEl.textContent = node.ending === 'win'
        ? '… Ending: somehow, you won …'
        : node.ending === 'lose'
          ? '… Ending: deeply earned …'
          : '… Ending: morally ambiguous …';
      return;
    }
    metaEl.textContent = 'Scenes visited: ' + visited;
    for (const c of node.choices || []) {
      const b = document.createElement('button');
      b.className = 'choice';
      b.textContent = '▶ ' + c.label;
      b.onclick = () => go(c.next);
      choicesEl.appendChild(b);
    }
  }
  go('start');
})();
</script>
</body>
</html>
