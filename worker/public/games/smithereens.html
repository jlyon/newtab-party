<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Smithereens</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥳</text></svg>"/>
<style>
  :root { --primary: #6B8E23; --secondary: #C3B091; --bg: #1a2410; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; }
  h1 { margin: 0; font-size: clamp(13px, 3.5vw, 20px); letter-spacing: 2px; }
  canvas { border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    width: min(95vw, calc((100dvh - 80px) * 2)); height: auto; display: block; }
  #controls { display: flex; gap: 6px; align-items: center; max-width: 95vw; flex-wrap: wrap; }
  @media (pointer: fine) { #controls { display: none; } }
  @media (pointer: coarse) { canvas { width: min(95vw, calc((100dvh - 170px) * 2)); } }
  .ctrl-group { display: flex; gap: 5px; }
  .btn { padding: 8px 12px; font-size: clamp(11px, 3vw, 14px); border: 2px solid var(--primary);
    background: rgba(0,0,0,0.3); color: var(--primary); cursor: pointer; border-radius: 6px;
    user-select: none; -webkit-touch-callout: none; white-space: nowrap; }
  .btn:active, .btn.held { background: var(--primary); color: var(--bg); }
  #btn-fire { border-color: var(--secondary); color: var(--secondary); padding: 8px 20px; font-weight: 700; }
  #btn-fire:active, #btn-fire.held { background: var(--secondary); color: var(--bg); }
  .wpn-btn { font-size: clamp(10px, 2.5vw, 12px); padding: 6px 8px; }
  .wpn-btn.active { background: var(--secondary); color: var(--bg); border-color: var(--secondary); }
  #power-bar-wrap { flex: 1; height: 16px; border: 2px solid var(--primary); border-radius: 4px; min-width: 60px; }
  #power-bar { height: 100%; width: 0%; background: var(--secondary); border-radius: 2px; transition: background 0.1s; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82); flex-direction: column; text-align: center; padding: 20px; }
  #overlay h2 { color: var(--secondary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  #overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>SMITHEREENS</h1>
  <canvas id="game" width="600" height="300"></canvas>
  <div id="controls">
    <div class="ctrl-group">
      <button class="btn" id="btn-left">← Angle</button>
      <button class="btn" id="btn-right">Angle →</button>
    </div>
    <button class="btn" id="btn-fire">⚡ FIRE</button>
    <div id="power-bar-wrap"><div id="power-bar"></div></div>
    <div class="ctrl-group" id="wpn-group"></div>
  </div>
</div>
<div id="overlay">
  <h2 id="overTitle">Victory!</h2>
  <p id="overMsg"></p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  let _hi = 0;
  function postHi(n) {
    n = Math.floor(n) || 0;
    if (n > _hi) { _hi = n; window.parent.postMessage({ highScore: n }, '*'); }
  }

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const powerBar = document.getElementById('power-bar');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const css = getComputedStyle(document.documentElement);
  const COL1 = css.getPropertyValue('--primary').trim();
  const COL2 = css.getPropertyValue('--secondary').trim();
  const W = canvas.width, H = canvas.height;

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME = 'BRAVO';
  const AI_NAME     = 'TANGO';
  const GRAVITY     = 0.18;
  const WIND_MAX    = 0.05;
  const AI_ACCURACY = 0.35;   // chaotic gremlin mode
  const WIN_MSG_P   = 'BRAVO turned TANGO into lawn confetti. The HOA is going to have notes.';
  const WIN_MSG_AI  = 'TANGO got a lucky shot off the gnome. BRAVO is now mulch.';
  const WEAPONS = [
    { name: 'Lawn Dart',   damage: 30, radius: 18, color: COL1 },
    { name: 'Grill Bomb',  damage: 50, radius: 32, color: '#ff8800' },
    { name: 'Skip Rock',   damage: 20, radius: 14, color: '#00ee88', bounces: 3 },
    { name: 'Mulch Pile',  damage: 8,  radius: 28, color: '#8B4513', dirt: true },
  ];
  // ==================================

  const TANK_W = 22, TANK_H = 14;
  const GROUND = H - 10;
  const N = W;

  let terrain, player, ai, proj, particles, explosions;
  let angle, power, charging, wpnIdx, phase, wind;
  let aiThinkTimer;
  let decor = [];

  const wpnGroup = document.getElementById('wpn-group');
  WEAPONS.forEach((w, i) => {
    const b = document.createElement('button');
    b.className = 'btn wpn-btn' + (i === 0 ? ' active' : '');
    b.id = 'wpn-' + i; b.textContent = w.name;
    b.addEventListener('click', () => selectWeapon(i));
    b.addEventListener('touchstart', e => { e.preventDefault(); selectWeapon(i); }, { passive: false });
    wpnGroup.appendChild(b);
  });
  function selectWeapon(i) {
    if (phase !== 'aim') return;
    wpnIdx = i;
    document.querySelectorAll('.wpn-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  }

  const held = { left: false, right: false, fire: false };
  function holdBtn(id, key) {
    const el = document.getElementById(id);
    const dn = e => { e.preventDefault(); held[key] = true; el.classList.add('held'); };
    const up = e => { e.preventDefault(); held[key] = false; el.classList.remove('held'); if (key === 'fire') releaseFireBtn(); };
    el.addEventListener('mousedown', dn); el.addEventListener('mouseup', up); el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', dn, { passive: false });
    el.addEventListener('touchend', up, { passive: false }); el.addEventListener('touchcancel', up, { passive: false });
  }
  holdBtn('btn-left', 'left'); holdBtn('btn-right', 'right'); holdBtn('btn-fire', 'fire');

  const keys = {};
  addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ') e.preventDefault();
    if (e.key === 'Enter' && overlay.style.display !== 'none') document.getElementById('restart').click();
    if (e.key >= '1' && e.key <= '4') selectWeapon(parseInt(e.key) - 1);
  });
  addEventListener('keyup', e => {
    if (keys[e.key] && e.key === ' ') releaseFireBtn();
    keys[e.key] = false;
  });

  function releaseFireBtn() {
    if (phase === 'aim' && charging && power > 2) fire(player, angle, power);
    charging = false; power = 0;
  }

  function makeTerrain() {
    terrain = new Float32Array(N);
    for (let x = 0; x < N; x++) {
      terrain[x] = H * 0.55
        + Math.sin(x * 0.018) * 40
        + Math.sin(x * 0.04 + 1.2) * 20
        + Math.sin(x * 0.007 + 2.5) * 30;
    }
    decor = [];
    const props = ['🌳','🌲','🌷','🪴','🦩','⏱️','🏡','🍄'];
    const usedX = new Set();
    for (let i = 0; i < 5; i++) {
      let x, tries = 0;
      do { x = 130 + Math.floor(Math.random() * (W - 260)); tries++; }
      while ([...usedX].some(u => Math.abs(u - x) < 50) && tries < 20);
      usedX.add(x);
      decor.push({ x, kind: props[Math.floor(Math.random() * props.length)] });
    }
  }
  function terrainY(x) { return terrain[Math.max(0, Math.min(N-1, Math.round(x)))]; }

  function reset() {
    makeTerrain();
    wind = (Math.random() * 2 - 1) * WIND_MAX;
    angle = 45; power = 0; charging = false; wpnIdx = 0; phase = 'aim';
    particles = []; explosions = []; aiThinkTimer = 0;
    player = { x: 70,     y: 0, hp: 100, maxHp: 100, facing:  1 };
    ai     = { x: W - 70, y: 0, hp: 100, maxHp: 100, facing: -1 };
    settleTanks();
    proj = null;
    selectWeapon(0);
    overlay.style.display = 'none';
  }

  function settleTanks() {
    player.y = terrainY(player.x) - TANK_H;
    ai.y     = terrainY(ai.x) - TANK_H;
  }

  function fire(tank, ang, pwr) {
    // accept either 'aim' (player) or 'ai-think' (AI takes its shot)
    if (phase !== 'aim' && phase !== 'ai-think') return;
    const rad = ang * Math.PI / 180;
    const facing = tank === player ? 1 : -1;
    const spd = pwr * 0.12;
    proj = {
      x: tank.x + facing * TANK_W / 2, y: tank.y,
      vx: Math.cos(rad) * spd * facing,
      vy: -Math.sin(rad) * spd,
      type: wpnIdx, bounces: WEAPONS[wpnIdx].bounces || 0,
      owner: tank,
    };
    phase = 'fire';
  }

  function applyExplosion(cx, ex, ey) {
    const wpn = WEAPONS[cx.type];
    const r = wpn.radius;
    for (let x = Math.max(0, Math.round(ex - r)); x <= Math.min(N-1, Math.round(ex + r)); x++) {
      const dist = Math.abs(x - ex);
      const depth = (1 - dist / r) * r * 0.6;
      if (wpn.dirt) terrain[x] = Math.max(0, terrain[x] - depth * 0.5);
      else          terrain[x] = Math.min(GROUND, terrain[x] + depth);
    }
    for (const tank of [player, ai]) {
      const d = Math.hypot(tank.x - ex, tank.y - ey);
      if (d < r + TANK_W) {
        const dmg = Math.round(wpn.damage * (1 - d / (r + TANK_W + 10)));
        tank.hp = Math.max(0, tank.hp - dmg);
        addParticles(tank.x, tank.y, '#ff4400', 8);
      }
    }
    decor = decor.filter(d => Math.hypot(d.x - ex, terrainY(d.x) - ey) > r * 0.9);
    addParticles(ex, ey, wpn.color, 18);
    explosions.push({ x: ex, y: ey, r: 0, maxR: r * 1.4, col: wpn.color });
    settleTanks();
  }

  function addParticles(x, y, col, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, v = 1 + Math.random() * 3;
      particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - 2, life: 20 + Math.random()*20, col });
    }
  }

  function checkWin() {
    if (player.hp <= 0) { endGame(false); return true; }
    if (ai.hp <= 0)     { endGame(true);  return true; }
    return false;
  }

  function endGame(playerWon) {
    phase = 'gameover';
    overTitle.textContent = playerWon ? 'BRAVO wins!' : 'TANGO wins!';
    overMsg.textContent = playerWon ? WIN_MSG_P : WIN_MSG_AI;
    postHi(player.hp);
    overlay.style.display = 'flex';
  }

  function aiTakeTurn() {
    const dx = player.x - ai.x;
    const dy = ai.y - player.y;
    const dist = Math.hypot(dx, Math.abs(dy));
    const idealAngle = Math.atan2(Math.abs(dy) + dist * 0.2, Math.abs(dx)) * 180 / Math.PI;
    const jitter = (1 - AI_ACCURACY) * 30;
    angle = Math.max(5, Math.min(85, idealAngle + (Math.random() - 0.5) * jitter));
    const idealPwr = Math.min(95, dist * 0.55 + 20);
    const gremlin = Math.random() < 0.18 ? (0.3 + Math.random() * 1.2) : (0.85 + Math.random() * 0.3);
    const pwr = idealPwr * gremlin;
    wpnIdx = Math.random() < 0.5 ? Math.floor(Math.random() * WEAPONS.length) : 0;
    fire(ai, angle, Math.min(100, pwr));
  }

  function step() {
    if (phase === 'aim') {
      if (keys['ArrowLeft'] || keys['a'] || held.left)  angle = Math.max(5,  angle - 1.5);
      if (keys['ArrowRight'] || keys['d'] || held.right) angle = Math.min(85, angle + 1.5);
      if (keys[' '] || held.fire) { charging = true; power = Math.min(100, power + 1.4); }
      powerBar.style.width = power + '%';
      powerBar.style.background = power > 70 ? '#ff4400' : COL2;
    }

    if (phase === 'fire' && proj) {
      proj.x += proj.vx + wind; proj.y += proj.vy; proj.vy += GRAVITY;
      if (proj.y >= terrainY(proj.x)) {
        if (proj.bounces > 0) {
          proj.vy *= -0.55; proj.vx *= 0.8; proj.bounces--; proj.y = terrainY(proj.x) - 2;
        } else {
          const wasAI = proj.owner === ai;
          applyExplosion(proj, proj.x, proj.y);
          proj = null;
          if (!checkWin()) {
            phase = 'settle';
            setTimeout(() => {
              if (phase === 'gameover') return;
              if (wasAI) { phase = 'aim'; power = 0; charging = false; }
              else       { phase = 'ai-think'; aiThinkTimer = 80; }
            }, 600);
          }
        }
      }
      if (proj && (proj.x < -10 || proj.x > W + 10 || proj.y > H + 20)) {
        const wasAI = proj.owner === ai;
        proj = null;
        if (wasAI) { phase = 'aim'; power = 0; charging = false; }
        else       { phase = 'ai-think'; aiThinkTimer = 60; }
      }
    }

    if (phase === 'ai-think') {
      aiThinkTimer--;
      if (aiThinkTimer <= 0) { aiTakeTurn(); }
    }

    for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--; }
    particles = particles.filter(p => p.life > 0);
    for (const e of explosions) { e.r += (e.maxR - e.r) * 0.2; }
    explosions = explosions.filter(e => e.r < e.maxR * 0.98);
  }

  function drawTank(tank, col, label) {
    const tx = tank.x, ty = tank.y;
    ctx.fillStyle = col; ctx.fillRect(tx - TANK_W/2, ty, TANK_W, TANK_H);
    ctx.fillRect(tx - 6, ty - 8, 12, 8);
    const ang = tank === player ? angle : (180 - angle);
    const bRad = ang * Math.PI / 180;
    const facing = tank === player ? 1 : -1;
    ctx.strokeStyle = col; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(tx, ty - 4);
    ctx.lineTo(tx + Math.cos(bRad) * 20 * facing, ty - 4 - Math.sin(bRad) * 20);
    ctx.stroke();
    const barW = 40, barH = 5;
    ctx.fillStyle = '#333'; ctx.fillRect(tx - barW/2, ty - 20, barW, barH);
    ctx.fillStyle = tank.hp > 50 ? '#44cc44' : tank.hp > 25 ? '#cccc00' : '#cc3300';
    ctx.fillRect(tx - barW/2, ty - 20, barW * tank.hp / tank.maxHp, barH);
    ctx.fillStyle = col; ctx.font = '10px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(label, tx, ty - 24);
    ctx.textAlign = 'left';
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
    grad.addColorStop(0, '#3b5a2b'); grad.addColorStop(0.5, '#7b8a55'); grad.addColorStop(1, '#c9b888');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (let x = 0; x < W; x += 14) ctx.fillRect(x, H * 0.45, 10, 18);
    ctx.fillRect(0, H * 0.45 + 16, W, 3);

    ctx.fillStyle = COL1;
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let x = 0; x < N; x++) ctx.lineTo(x, terrain[x]);
    ctx.lineTo(N, H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = COL2; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, terrain[0]);
    for (let x = 1; x < N; x++) ctx.lineTo(x, terrain[x]);
    ctx.stroke();

    ctx.font = '18px system-ui'; ctx.textAlign = 'center';
    for (const d of decor) {
      ctx.fillText(d.kind, d.x, terrainY(d.x) - 2);
    }
    ctx.textAlign = 'left';

    ctx.fillStyle = COL2; ctx.globalAlpha = 0.85; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
    const windStr = wind > 0 ? '→' : '←';
    ctx.fillText('Breeze ' + windStr + ' ' + Math.abs(wind * 1000).toFixed(0), W/2, 16);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';

    for (const e of explosions) {
      ctx.strokeStyle = e.col; ctx.lineWidth = 3; ctx.globalAlpha = 1 - e.r / e.maxR;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    for (const p of particles) {
      ctx.fillStyle = p.col; ctx.globalAlpha = p.life / 30;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (proj) {
      ctx.fillStyle = WEAPONS[proj.type].color; ctx.shadowColor = WEAPONS[proj.type].color; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(proj.x, proj.y, 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    drawTank(player, COL1, PLAYER_NAME);
    drawTank(ai, COL2, AI_NAME);

    if (phase === 'aim') {
      ctx.fillStyle = COL1; ctx.font = 'bold 12px system-ui';
      ctx.fillText('Angle: ' + Math.round(angle) + '°  ·  ' + WEAPONS[wpnIdx].name + '  ·  1–4 switch  ·  Power: ' + Math.round(power) + '%', 8, 16);
    } else if (phase === 'ai-think' || (phase === 'fire' && proj?.owner === ai)) {
      ctx.fillStyle = COL2; ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'center';
      ctx.fillText(AI_NAME + " is squinting at the sun...", W/2, 30);
      ctx.textAlign = 'left';
    }
  }

  function loop() { step(); draw(); requestAnimationFrame(loop); }
  document.getElementById('restart').addEventListener('click', reset);
  reset(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
