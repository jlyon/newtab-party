<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Hognose</title>
<style>
  :root { --primary: #d4a373; --secondary: #ff6b9d; --bg: #1f1611; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--primary);
    font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; }
  h1 { margin: 0; font-size: clamp(14px, 4vw, 22px); letter-spacing: 2px; }
  #hud { display: flex; gap: 20px; font-size: clamp(11px, 3vw, 14px); opacity: 0.85; }
  canvas { border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    width: min(440px, 92vw); height: auto; display: block; }
  #dpad { display: none; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(2, 50px); gap: 6px; }
  body.touch #dpad { display: grid; }
  @media (pointer: coarse) { canvas { width: min(440px, 92vw, calc(100dvh - 200px)); } }
  .dp { width: 50px; height: 50px; font-size: 22px; border: 2px solid var(--primary);
    background: rgba(0,0,0,0.3); color: var(--primary); cursor: pointer; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; user-select: none; -webkit-touch-callout: none; }
  .dp:active, .dp.held { background: var(--primary); color: var(--bg); }
  #dp-up    { grid-column: 2; grid-row: 1; }
  #dp-left  { grid-column: 1; grid-row: 2; }
  #dp-down  { grid-column: 2; grid-row: 2; }
  #dp-right { grid-column: 3; grid-row: 2; }
  .overlay { position: fixed; inset: 0; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); flex-direction: column; text-align: center; padding: 20px; }
  #overlay { display: none; }
  #start-overlay { display: flex; }
  .overlay h2 { color: var(--secondary); font-size: clamp(22px, 6vw, 36px); margin: 0 0 8px; }
  .overlay p { color: var(--primary); margin: 4px 0; font-size: clamp(12px, 3vw, 15px); }
  .overlay button { margin-top: 18px; padding: 12px 28px; font-size: clamp(14px, 3.5vw, 16px);
    background: var(--primary); color: var(--bg); border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>HOGNOSE</h1>
  <div id="hud">
    <span>Snake: Hognose</span>
    <span id="score">Caps: 0</span>
    <span id="hi">Best: 0</span>
  </div>
  <canvas id="game" width="440" height="440"></canvas>
  <div id="dpad">
    <button class="dp" id="dp-up">▲</button>
    <button class="dp" id="dp-left">◀</button>
    <button class="dp" id="dp-down">▼</button>
    <button class="dp" id="dp-right">▶</button>
  </div>
</div>
<div id="start-overlay" class="overlay">
  <h2>HOGNOSE</h2>
  <p>Slither, eat graduation caps, and grow. Don't hit the walls or your own tail.</p>
  <p>Arrows / WASD &middot; swipe &middot; or D-pad to steer.</p>
  <button id="startBtn">Play</button>
</div>
<div id="overlay" class="overlay">
  <h2 id="overTitle">Oops.</h2>
  <p id="overMsg"></p>
  <p id="overScore"></p>
  <button id="restart">Play again</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl  = document.getElementById('score');
  const hiEl     = document.getElementById('hi');
  const overlay  = document.getElementById('overlay');
  const overTitle = document.getElementById('overTitle');
  const overMsg   = document.getElementById('overMsg');
  const overScore = document.getElementById('overScore');

  const css = getComputedStyle(document.documentElement);
  const COL1 = css.getPropertyValue('--primary').trim();
  const COL2 = css.getPropertyValue('--secondary').trim();
  const W = canvas.width;

  // ===== GAME-SPECIFIC SECTION =====
  const PLAYER_NAME = 'Hognose';
  const FOOD_NAME   = 'graduation cap';
  const GRID        = 20;
  const MOVE_MS     = 200;
  const WIN_SCORE   = 0;            // 0 = endless (fixed score ceilings hurt leaderboard fairness)
  const DIE_WALL_MSG  = 'Hognose smacked the wall and played dead. The wall did not call 911.';
  const DIE_SELF_MSG  = 'Hognose ate her own tail. She is now huffing dramatically about it.';
  const WIN_MSG       = 'DR. HOGNOSE, PhD. 25 caps collected. Diploma earned. Will huff for tenure.';
  // ==================================

  const CELL = W / GRID;
  const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const OPP  = { up:'down', down:'up', left:'right', right:'left' };

  let snake, food, dir, next, score, hiScore = 0, running, started, lastStep, hitWall;
  let playing = false;   // false until the player clicks Play on the title screen
  const startOverlay = document.getElementById('start-overlay');

  function randFree() {
    const free = [];
    for (let x = 0; x < GRID; x++)
      for (let y = 0; y < GRID; y++)
        if (!snake.some(s => s[0]===x && s[1]===y)) free.push([x,y]);
    return free[Math.floor(Math.random() * free.length)];
  }
  function reset() {
    const c = Math.floor(GRID / 2);
    snake = [[c,c],[c-1,c],[c-2,c]];
    dir = 'right'; next = 'right'; score = 0; running = true; started = false; lastStep = 0; hitWall = false;
    food = randFree();
    overlay.style.display = 'none'; updateHud();
  }
  function updateHud() {
    scoreEl.textContent = 'Caps: ' + score;
    hiEl.textContent = 'Best: ' + hiScore;
  }
  // Normalize caps eaten so a strong run (~30+ caps) posts ~1000.
  const SCORE_SCALE = 30;
  let _hi = 0;
  function postHi(n) {
    const v = Math.round((Math.floor(n) || 0) * SCORE_SCALE);
    if (v > _hi) _hi = v;
    try { window.parent.postMessage({ highScore: v }, '*'); } catch (e) {}
  }
  function endGame(won) {
    running = false;
    if (score > hiScore) hiScore = score;
    postHi(score);
    overTitle.textContent = won ? 'GRADUATED.' : 'Playing dead.';
    overMsg.textContent = won ? WIN_MSG : (hitWall ? DIE_WALL_MSG : DIE_SELF_MSG);
    overScore.textContent = 'Caps: ' + score + (score >= hiScore && score > 0 ? ' · new best!' : '  ·  Best: ' + hiScore);
    updateHud(); overlay.style.display = 'flex';
  }
  function setDir(d) {
    if (!playing || !running) return;
    if (!started) started = true;
    if (d !== OPP[dir]) next = d;
  }

  function step(now) {
    if (!started || now - lastStep < MOVE_MS) return;
    lastStep = now;
    dir = next;
    const [dx, dy] = DIRS[dir];
    const head = [snake[0][0] + dx, snake[0][1] + dy];
    if (head[0] < 0 || head[0] >= GRID || head[1] < 0 || head[1] >= GRID) { hitWall = true; endGame(false); return; }
    if (snake.some(s => s[0] === head[0] && s[1] === head[1])) { hitWall = false; endGame(false); return; }
    snake.unshift(head);
    if (head[0] === food[0] && head[1] === food[1]) {
      score++;
      if (WIN_SCORE > 0 && score >= WIN_SCORE) { updateHud(); endGame(true); return; }
      food = randFree();
    } else { snake.pop(); }
    updateHud();
  }

  function drawCap(cx, cy, r) {
    const pulse = 0.9 + Math.sin(Date.now() / 280) * 0.1;
    const s = r * pulse;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = COL1;
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.arc(0, s * 0.35, s * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = COL2;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.65);
    ctx.lineTo(s * 1.05, -s * 0.15);
    ctx.lineTo(0, s * 0.35);
    ctx.lineTo(-s * 1.05, -s * 0.15);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = COL2;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(-s * 0.45, -s * 0.15, s * 0.9, s * 0.25);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = COL1;
    ctx.lineWidth = Math.max(1, s * 0.12);
    ctx.beginPath();
    ctx.moveTo(s * 0.55, -s * 0.4);
    ctx.lineTo(s * 0.75, s * 0.1);
    ctx.stroke();
    ctx.fillStyle = COL1;
    ctx.beginPath(); ctx.arc(s * 0.75, s * 0.18, Math.max(1.5, s * 0.18), 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, W);
    ctx.fillStyle = COL1; ctx.globalAlpha = 0.05;
    for (let x = 0; x < GRID; x++)
      for (let y = 0; y < GRID; y++)
        ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);
    ctx.globalAlpha = 1;
    drawCap(food[0]*CELL + CELL/2, food[1]*CELL + CELL/2, CELL/2 - 1);
    for (let i = 0; i < snake.length; i++) {
      const [sx, sy] = snake[i];
      const cx = sx*CELL + CELL/2;
      const cy = sy*CELL + CELL/2;
      ctx.globalAlpha = i === 0 ? 1 : Math.max(0.45, 1 - i / snake.length * 0.6);
      ctx.fillStyle = COL1;
      const pad = i === 0 ? 1 : 2;
      ctx.beginPath();
      const x = sx*CELL + pad, y = sy*CELL + pad, sz = CELL - pad*2;
      const rr = Math.min(sz/3, 6);
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + sz - rr, y);
      ctx.quadraticCurveTo(x + sz, y, x + sz, y + rr);
      ctx.lineTo(x + sz, y + sz - rr);
      ctx.quadraticCurveTo(x + sz, y + sz, x + sz - rr, y + sz);
      ctx.lineTo(x + rr, y + sz);
      ctx.quadraticCurveTo(x, y + sz, x, y + sz - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath(); ctx.fill();
      if (i === 0) {
        const [dx, dy] = DIRS[dir];
        ctx.fillStyle = COL2;
        ctx.beginPath();
        ctx.moveTo(cx + dx * CELL * 0.45, cy + dy * CELL * 0.45);
        ctx.lineTo(cx + dx * CELL * 0.2 - dy * CELL * 0.15, cy + dy * CELL * 0.2 + dx * CELL * 0.15);
        ctx.lineTo(cx + dx * CELL * 0.2 + dy * CELL * 0.15, cy + dy * CELL * 0.2 - dx * CELL * 0.15);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#1a0e08';
        const eyeOff = CELL * 0.18, fwd = CELL * 0.05;
        ctx.beginPath(); ctx.arc(cx + dx * fwd + (-dy) * eyeOff, cy + dy * fwd + dx * eyeOff, Math.max(1.5, CELL * 0.09), 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + dx * fwd - (-dy) * eyeOff, cy + dy * fwd - dx * eyeOff, Math.max(1.5, CELL * 0.09), 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    if (!started) {
      ctx.fillStyle = COL1; ctx.globalAlpha = 0.65;
      ctx.font = Math.round(W * 0.038) + 'px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('Arrows · swipe · D-pad to slither', W/2, W/2);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  }

  addEventListener('keydown', e => {
    const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                  w:'up', s:'down', a:'left', d:'right' };
    if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
    if (e.key === 'Enter') {
      if (startOverlay.style.display !== 'none') { document.getElementById('startBtn').click(); return; }
      if (overlay.style.display !== 'none') document.getElementById('restart').click();
    }
  });
  ['up','down','left','right'].forEach(d => {
    const el = document.getElementById('dp-' + d);
    const go = e => { e.preventDefault(); setDir(d); };
    el.addEventListener('mousedown', go);
    el.addEventListener('touchstart', go, { passive: false });
  });
  let swipeStart = null;
  canvas.addEventListener('touchstart', e => { swipeStart = [e.touches[0].clientX, e.touches[0].clientY]; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!swipeStart) return;
    const dx = e.changedTouches[0].clientX - swipeStart[0];
    const dy = e.changedTouches[0].clientY - swipeStart[1];
    swipeStart = null;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  });

  function grabFocus(){ try{ window.focus(); }catch(e){} }
  window.addEventListener('load', grabFocus);
  window.addEventListener('pointerdown', grabFocus);
  window.addEventListener('touchstart', () => document.body.classList.add('touch'), { once: true, passive: true });

  function loop(now) { if (playing && running) step(now); draw(); requestAnimationFrame(loop); }
  document.getElementById('startBtn').addEventListener('click', () => {
    grabFocus(); startOverlay.style.display = 'none'; reset(); playing = true;
  });
  document.getElementById('restart').addEventListener('click', () => { grabFocus(); reset(); playing = true; });
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
